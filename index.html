<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Termo Infinito</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script src="https://pl29010888.profitablecpmratenetwork.com/a4/b5/a8/a4b5a8c3910b3d082855407a6ae50703.js"></script>

    <style>
        :root { --cor-correta: #6aaa64; --cor-lugar-errado: #c9b458; --cor-errada: #3a3a3c; --preto: #121213; }
        
        body { background-color: var(--preto); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        .main-layout { display: flex; justify-content: center; width: 100vw; min-height: 100vh; }

        /* Colunas de Anúncio Laterais (Só aparecem no PC) */
        .ad-sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #0c0c0c;
        }

        .game-column { width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center; z-index: 10; }

        /* Ajuste para sumir as barras no celular e dar espaço total ao jogo */
        @media (max-width: 900px) {
            .ad-sidebar { display: none !important; } 
            .game-column { width: 100vw; max-width: 100%; }
        }

        .header-jogo { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 10px 15px; background: #1a1a1b; border-bottom: 1px solid #333; box-sizing: border-box; }
        .btn-logout { background: #ce3a3a; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        
        #grid { display: grid; gap: 4px; margin: 15px 0; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .tile { width: 52px; height: 52px; border: 2px solid #3a3a3c; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold; text-transform: uppercase; }
        .tile.correct { background: var(--cor-correta); border: none; }
        .tile.present { background: var(--cor-lugar-errado); border: none; }
        .tile.absent { background: var(--cor-errada); border: none; }

        #keyboard { display: flex; flex-direction: column; gap: 6px; width: 98%; margin-top: auto; padding-bottom: 15px; }
        .kb-row { display: flex; justify-content: center; gap: 4px; }
        .key { padding: 18px 0; background: #818384; border-radius: 4px; color: white; border: none; cursor: pointer; font-size: 0.8rem; font-weight: bold; flex: 1; }
        .key.wide { flex: 1.5; background: #565758; }

        .auth-card { background: #222; padding: 25px; border-radius: 12px; margin-top: 40px; text-align: center; width: 300px; border: 1px solid #444; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #111; color: white; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; background: var(--cor-correta); border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-layout">
        
        <div class="ad-sidebar">
            <p style="font-size: 10px; color: #444; margin-bottom: 5px;">PUBLICIDADE</p>
            <script>
                atOptions = {
                    'key' : 'bbd26afcc6a6f83c66b0322a7e089fb1',
                    'format' : 'iframe',
                    'height' : 600,
                    'width' : 160,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/bbd26afcc6a6f83c66b0322a7e089fb1/invoke.js"></script>
        </div>

        <div class="game-column">
            <div id="auth-screen">
                <div class="auth-card">
                    <h2 style="margin-top:0">Termo Infinito</h2>
                    <input type="text" id="loginNick" placeholder="Nome">
                    <input type="password" id="loginPass" placeholder="Senha">
                    <button class="btn-main" onclick="fazerLogin()">JOGAR</button>
                </div>
            </div>

            <div id="game-container" style="display:none; width: 100%; height: 95vh; display: flex; flex-direction: column;">
                <div class="header-jogo">
                    <div>👤 <span id="displayNick"></span> | 🔥 <span id="streakDisplay">0</span></div>
                    <button class="btn-logout" onclick="logout()">SAIR</button>
                </div>
                
                <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <div id="grid"></div>
                    <div id="message" style="height:25px; color:#ffd700; text-align:center; font-weight:bold; margin-bottom: 10px;"></div>
                </div>

                <div id="keyboard"></div>
            </div>
        </div>

        <div class="ad-sidebar">
            <p style="font-size: 10px; color: #444; margin-bottom: 5px;">PUBLICIDADE</p>
            <script>
                atOptions = {
                    'key' : 'bbd26afcc6a6f83c66b0322a7e089fb1',
                    'format' : 'iframe',
                    'height' : 600,
                    'width' : 160,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/bbd26afcc6a6f83c66b0322a7e089fb1/invoke.js"></script>
        </div>

    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCxq9aM8B_XWioHztJhVVLnawlykYD2xs0",
            authDomain: "termo-rank-5d80d.firebaseapp.com",
            databaseURL: "https://termo-rank-5d80d-default-rtdb.firebaseio.com",
            projectId: "termo-rank-5d80d",
            storageBucket: "termo-rank-5d80d.firebasestorage.app",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let nickAtual = ""; let streak = 0; let segredo = ""; let linha = 0; 
        let tentativaArray = ["", "", "", "", ""]; let focadoIndex = 0;
        const PALAVRAS = ["SAGAZ", "AMAGO", "TERMO", "EXITO", "NOBRE", "SENSO", "AFETO", "ALGOZ", "ETICA", "FAZER", "TENRA", "SUTIL", "VIGOR", "AUREA", "SANAR", "PODER", "IDEIA", "MUITO", "VIVER", "JUSTO"];

        async function fazerLogin() {
            const nick = document.getElementById('loginNick').value.trim();
            const pass = document.getElementById('loginPass').value;
            if(!nick) return;
            try { await auth.signInWithEmailAndPassword(nick.toLowerCase() + "@termo.com", pass); } catch (e) { alert("Login Inválido!"); }
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).once('value').then(snap => {
                    const d = snap.val();
                    nickAtual = d.nick; streak = d.streak || 0;
                    mostrarJogo();
                });
            }
        });

        function mostrarJogo() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('displayNick').innerText = nickAtual;
            document.getElementById('streakDisplay').innerText = streak;
            novoJogo(); criarTeclado();
        }

        function novoJogo() {
            segredo = PALAVRAS[Math.floor(Math.random() * PALAVRAS.length)].toUpperCase();
            linha = 0; tentativaArray = ["", "", "", "", ""]; focadoIndex = 0;
            const grid = document.getElementById('grid'); grid.innerHTML = "";
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div'); row.className = 'row';
                for (let j = 0; j < 5; j++) {
                    const t = document.createElement('div'); t.className = 'tile';
                    row.appendChild(t);
                }
                grid.appendChild(row);
            }
            atualizarVisual();
        }

        function atualizarVisual() {
            const rows = document.querySelectorAll('.row');
            if(!rows[linha]) return;
            const tiles = rows[linha].querySelectorAll('.tile');
            tiles.forEach((t, i) => { t.innerText = tentativaArray[i]; });
        }

        function digitar(k) {
            if(k === 'ENTER') { if(tentativaArray.join('').length === 5) verificar(); return; }
            if(k === 'DEL') { if(focadoIndex > 0) { focadoIndex--; tentativaArray[focadoIndex] = ""; } }
            else { if(focadoIndex < 5) { tentativaArray[focadoIndex] = k; focadoIndex++; } }
            atualizarVisual();
        }

        function verificar() {
            const tiles = document.querySelectorAll('.row')[linha].querySelectorAll('.tile');
            let ok = 0;
            for(let i=0; i<5; i++) {
                if(tentativaArray[i] === segredo[i]) { tiles[i].classList.add('correct'); ok++; }
                else if(segredo.includes(tentativaArray[i])) tiles[i].classList.add('present');
                else tiles[i].classList.add('absent');
            }
            if(ok === 5) { 
                document.getElementById('message').innerText = "VENCEU! 🎉"; 
                streak++;
                db.ref('users/' + auth.currentUser.uid).update({ streak: streak });
                document.getElementById('streakDisplay').innerText = streak;
                setTimeout(novoJogo, 2000); 
            } else if(linha === 5) {
                document.getElementById('message').innerText = "ERA: " + segredo;
                setTimeout(novoJogo, 3000);
            } else { linha++; focadoIndex = 0; tentativaArray = ["","","","",""]; atualizarVisual(); }
        }

        function criarTeclado() {
            const lay = [["Q","W","E","R","T","Y","U","I","O","P"], ["A","S","D","F","G","H","J","K","L"], ["DEL","Z","X","C","V","B","N","M","ENTER"]];
            const kb = document.getElementById('keyboard'); kb.innerHTML = "";
            lay.forEach(r => {
                const div = document.createElement('div'); div.className = 'kb-row';
                r.forEach(k => {
                    const b = document.createElement('button'); b.className = (k.length > 1) ? 'key wide' : 'key';
                    b.innerText = k; b.onclick = () => digitar(k); div.appendChild(b);
                });
                kb.appendChild(div);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Verbete Online - VIP Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --cor-correta: #6aaa64; --cor-lugar-errado: #c9b458; --cor-errada: #3a3a3c; --preto: #121213; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background-color: var(--preto); color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100dvh; display: flex; align-items: center; justify-content: center; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .overlay.active { display: flex; }

        .card { background: #222; padding: 20px; border-radius: 12px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #333; }
        .btn-main { width: 100%; padding: 12px; background: var(--cor-correta); border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 8px; text-transform: uppercase; }
        
        .list-container { text-align: left; margin: 10px 0; max-height: 250px; overflow-y: auto; background: #111; padding: 10px; border-radius: 8px; border: 1px solid #444; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; font-size: 14px; }
        .buy-btn { background: #4a90e2; border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-family: monospace; }
        .game-column { width: 100%; max-width: 450px; display: flex; flex-direction: column; height: 100%; position: relative; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1a1a1b; border-bottom: 1px solid #333; }
        
        #grid { display: grid; gap: 5px; padding: 10px; margin: auto; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tile { width: 60px; height: 60px; border: 2px solid #3a3a3c; display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .tile.correct { background: var(--cor-correta); border: none; }
        .tile.present { background: var(--cor-lugar-errado); border: none; }
        .tile.absent { background: var(--cor-errada); border: none; }

        #keyboard { padding: 10px; }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 6px; }
        .key { height: 55px; background: #818384; border-radius: 4px; color: white; border: none; font-size: 1rem; font-weight: bold; flex: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.3s, transform 0.2s; }
        .key.wide { flex: 1.5; background: #565758; }
        .key.hidden { opacity: 0; pointer-events: none; transform: scale(0.8); }

        @media (max-width: 400px) { .tile { width: 15vw; height: 15vw; } }
    </style>
</head>
<body>

    <div class="game-column">
        <div id="auth-screen" class="overlay active">
            <div class="card">
                <h1>Verbete</h1>
                <input type="text" id="loginNick" style="width:100%; padding:12px; margin-bottom:8px; background:#111; color:white; border:1px solid #444; border-radius:5px;" placeholder="Nome">
                <input type="password" id="loginPass" style="width:100%; padding:12px; margin-bottom:8px; background:#111; color:white; border:1px solid #444; border-radius:5px;" placeholder="Senha">
                <button class="btn-main" onclick="fazerLogin()">Entrar / Criar</button>
            </div>
        </div>

        <div id="rank-screen" class="overlay">
            <div class="card">
                <h2>🏆 Top 10 Global</h2>
                <div id="rank-content" class="list-container">Carregando...</div>
                <button class="btn-main" onclick="fecharTelas()">Voltar</button>
            </div>
        </div>

        <div id="shop-screen" class="overlay">
            <div class="card">
                <h2>🛒 Loja</h2>
                <p>💰 <span id="shopCoinsDisplay">0</span></p>
                <div id="shop-content" class="list-container"></div>
                <button class="btn-main" style="background: #333;" onclick="fecharTelas()">Sair</button>
            </div>
        </div>

        <div id="game-container" style="display:none; flex-direction:column; height:100%;">
            <div class="top-nav">
                <div style="font-weight:bold; font-size: 13px;">🔥 <span id="streakDisplay">0</span> | 💰 <span id="coinsDisplay">0</span></div>
                <div style="display:flex; gap:12px;">
                    <button onclick="abrirLoja()" style="background:none; border:none; color:white; cursor:pointer; font-size:20px;">🛒</button>
                    <button onclick="abrirRanking()" style="background:none; border:none; color:white; cursor:pointer; font-size:20px;">🏆</button>
                    <button onclick="fazerLogout()" style="background:none; border:none; color:white; cursor:pointer; font-size:20px;">🚪</button>
                </div>
            </div>
            <div id="grid"></div>
            <div id="message" style="color:#ffd700; font-weight:bold; height:20px; text-align:center; margin-bottom:10px;"></div>
            <div style="padding:0 10px 10px 10px;"><button onclick="pularPalavra()" style="width:100%; padding:12px; background:#4a90e2; border:none; border-radius:6px; color:white; font-weight:bold;">⏭️ PULAR</button></div>
            <div id="keyboard"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCxq9aM8B_XWioHztJhVVLnawlykYD2xs0", authDomain: "termo-rank-5d80d.firebaseapp.com", databaseURL: "https://termo-rank-5d80d-default-rtdb.firebaseio.com", projectId: "termo-rank-5d80d", storageBucket: "termo-rank-5d80d.firebasestorage.app" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();
        const SEGREDO_POOL = ["SAGAZ", "AMAGO", "TERMO", "EXITO", "NOBRE", "SENSO", "AFETO", "ALGOZ", "ETICA", "FAZER", "PODER", "VIVER", "JUSTO", "IDEIA", "MUITO", "SONHO", "TEMPO", "VALOR", "BRAVO", "FORTE", "GRITO", "MUNDO"];

        let userLocal = {}; let segredo = ""; let linha = 0; let focadoIndex = 0;
        let tentativaArray = ["","","","",""];
        let letrasErradas = new Set();

        // FUNÇÃO PARA REMOVER ACENTOS
        function limparTexto(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
        }

        window.revelar = () => alert("Palavra: " + segredo);
        window.setCoins = (v) => db.ref('users/'+auth.currentUser.uid).update({ coins: parseInt(v) });

        function fecharTelas() { document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active')); }
        function abrirRanking() { document.getElementById('rank-screen').classList.add('active'); carregarRank(); }
        function abrirLoja() { document.getElementById('shop-screen').classList.add('active'); carregarLoja(); }

        async function carregarRank() {
            const list = document.getElementById('rank-content'); list.innerHTML = "Carregando...";
            db.ref('users').once('value', s => {
                let arr = []; s.forEach(c => { let d = c.val(); d.streak = Number(d.streak)||0; arr.push(d); });
                arr.sort((a,b) => b.streak - a.streak);
                let h = ""; arr.slice(0, 10).forEach((p, idx) => {
                    const cor = p.selectedColor || '#fff';
                    const tag = p.selectedTitle ? `<span style="font-size:10px; opacity:0.6;">${p.selectedTitle}</span> ` : "";
                    h += `<div class="rank-item"><span style="color:${cor}">${idx+1}º ${tag}${p.nick}</span><span>🔥 ${p.streak}</span></div>`;
                });
                list.innerHTML = h || "Vazio.";
            });
        }

        function carregarLoja() {
            const list = document.getElementById('shop-content');
            document.getElementById('shopCoinsDisplay').innerText = userLocal.coins || 0;
            const items = [{id:'c1',tipo:'cor',nome:'Azul',valor:20,css:'#00d4ff'},{id:'c2',tipo:'cor',nome:'Dourado',valor:50,css:'#ffd700'},{id:'t1',tipo:'titulo',nome:'Tag [PRO]',valor:30,txt:'[PRO]'}];
            let h = ""; items.forEach(it => {
                const jaTem = userLocal.inventory && userLocal.inventory.includes(it.id);
                const usando = (it.tipo === 'cor' && userLocal.selectedColor === it.css) || (it.tipo === 'titulo' && userLocal.selectedTitle === it.txt);
                h += `<div class="item-row"><span style="color:${it.css||'#fff'}">${it.nome}</span><button class="buy-btn" ${usando?'disabled':''} onclick="comprarOuEquipar('${it.id}')">${jaTem?'EQUIPAR':`💰 ${it.valor}`}</button></div>`;
            });
            list.innerHTML = h;
        }

        async function comprarOuEquipar(id) {
            const items = [{id:'c1',tipo:'cor',css:'#00d4ff',valor:20},{id:'c2',tipo:'cor',css:'#ffd700',valor:50},{id:'t1',tipo:'titulo',txt:'[PRO]',valor:30}];
            const it = items.find(i => i.id === id); const inv = userLocal.inventory || [];
            if(inv.includes(id)) {
                let up = {}; if(it.tipo === 'cor') up.selectedColor = it.css; else up.selectedTitle = it.txt;
                await db.ref('users/'+auth.currentUser.uid).update(up);
            } else if(userLocal.coins >= it.valor) {
                inv.push(id); let up = { coins: userLocal.coins - it.valor, inventory: inv };
                if(it.tipo === 'cor') up.selectedColor = it.css; else up.selectedTitle = it.txt;
                await db.ref('users/'+auth.currentUser.uid).update(up);
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                db.ref('users/'+user.uid).on('value', s => {
                    userLocal = s.val() || {};
                    document.getElementById('auth-screen').classList.remove('active');
                    document.getElementById('game-container').style.display='flex';
                    document.getElementById('streakDisplay').innerText = userLocal.streak || 0;
                    document.getElementById('coinsDisplay').innerText = userLocal.coins || 0;
                    if(!segredo) novoJogo();
                });
            }
        });

        function novoJogo() {
            segredo = SEGREDO_POOL[Math.floor(Math.random()*SEGREDO_POOL.length)];
            linha = 0; focadoIndex = 0; tentativaArray = ["","","","",""];
            letrasErradas.clear();
            const g = document.getElementById('grid'); g.innerHTML = "";
            for(let i=0; i<6; i++) {
                const r = document.createElement('div'); r.className = 'row';
                for(let j=0; j<5; j++) { const t = document.createElement('div'); t.className = 'tile'; r.appendChild(t); }
                g.appendChild(r);
            }
            criarTeclado(); atualizarVisual();
        }

        async function verificar() {
            const chuteRaw = tentativaArray.join("");
            const chute = limparTexto(chuteRaw);
            const alvo = limparTexto(segredo);

            const res = await fetch(`https://api.dicionario-aberto.net/word/${chute.toLowerCase()}`);
            const data = await res.json();
            if(data.length === 0 && !["ETICA", "AREIA", "AVIAO", "AMAGO", "EXITO"].includes(chute)) { 
                document.getElementById('message').innerText = "Inválida!"; return; 
            }

            const ts = document.querySelectorAll('.row')[linha].querySelectorAll('.tile');
            let acertos = 0;
            
            for(let i=0; i<5; i++) {
                const letra = chute[i];
                if(letra === alvo[i]) { ts[i].classList.add('correct'); acertos++; }
                else if(alvo.includes(letra)) { ts[i].classList.add('present'); }
                else { ts[i].classList.add('absent'); letrasErradas.add(letra); }
            }

            if(acertos === 5) {
                let ganho = (userLocal.streak >= 4) ? 2 * Math.pow(2, (userLocal.streak - 3)) : 2;
                await db.ref('users/'+auth.currentUser.uid).update({ streak: (userLocal.streak||0) + 1, coins: (userLocal.coins||0) + ganho });
                setTimeout(novoJogo, 2000);
            } else if(linha === 5) {
                document.getElementById('message').innerText = "Era: " + segredo;
                await db.ref('users/'+auth.currentUser.uid).update({ streak: 0 });
                setTimeout(novoJogo, 3000);
            } else { 
                linha++; focadoIndex = 0; tentativaArray = ["","","","",""]; 
                atualizarVisual(); criarTeclado(); 
            }
        }

        function digitar(k) {
            if(k === "ENTER") { if(!tentativaArray.includes("")) verificar(); }
            else if(k === "DEL") { tentativaArray[focadoIndex] = ""; if(focadoIndex > 0) focadoIndex--; }
            else { tentativaArray[focadoIndex] = k; if(focadoIndex < 4) focadoIndex++; }
            atualizarVisual();
        }

        function atualizarVisual() {
            const ts = document.querySelectorAll('.row')[linha].querySelectorAll('.tile');
            ts.forEach((t, i) => { t.innerText = tentativaArray[i]; t.style.borderColor = (i===focadoIndex)?'#818384':'#3a3a3c'; });
        }

        function criarTeclado() {
            const lay=[["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["DEL","Z","X","C","V","B","N","M","ENTER"]];
            const kb=document.getElementById('keyboard'); kb.innerHTML="";
            lay.forEach(r=>{
                const d=document.createElement('div'); d.className='kb-row';
                r.forEach(k=>{
                    const b=document.createElement('button');
                    b.className=(k.length>1)?'key wide':'key';
                    if(letrasErradas.has(limparTexto(k))) b.classList.add('hidden');
                    b.innerText=k; b.onclick=()=>digitar(k); d.appendChild(b);
                });
                kb.appendChild(d);
            });
        }

        window.addEventListener('keydown', (e) => {
            if(e.key === "Enter") digitar("ENTER"); else if(e.key === "Backspace") digitar("DEL");
            else if(e.key.length === 1 && e.key.match(/[a-z]/i)) {
                const k = e.key.toUpperCase();
                if(!letrasErradas.has(limparTexto(k))) digitar(k);
            }
        });

        async function pularPalavra() { if(!userLocal.skipUsed) { await db.ref('users/'+auth.currentUser.uid).update({ skipUsed: true, streak: (userLocal.streak||0)+1 }); novoJogo(); } }
        function fazerLogout() { auth.signOut().then(() => location.reload()); }
        async function fazerLogin() {
            const n = document.getElementById('loginNick').value.trim(); const p = document.getElementById('loginPass').value;
            if(!n || !p) return alert("Preencha!");
            try { await auth.signInWithEmailAndPassword(n.toLowerCase()+"@termo.com", p); } 
            catch(e) { 
                const res = await auth.createUserWithEmailAndPassword(n.toLowerCase()+"@termo.com", p);
                await db.ref('users/'+res.user.uid).set({nick:n, streak:0, coins:0, inventory:[], selectedColor:'#fff', selectedTitle:''});
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Termo Infinito</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script async="async" data-cfasync="false" src="//pl29010888.profitablecpmratenetwork.com/a4/b5/a8/a4b5a8c3910b3d082855407a6ae50703.js"></script>

    <style>
        :root { --cor-correta: #6aaa64; --cor-lugar-errado: #c9b458; --cor-errada: #3a3a3c; --preto: #121213; }
        
        body { 
            background-color: var(--preto); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Layout em 3 Colunas para o PC */
        .main-layout {
            display: flex;
            width: 100%;
            justify-content: center;
        }

        /* Espaços para Banners Laterais (Só aparecem no PC) */
        .ad-sidebar {
            flex: 1;
            display: flex;
            justify-content: center;
            padding-top: 80px;
        }

        /* O Jogo fica no meio */
        .game-column {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @media (max-width: 1000px) {
            .ad-sidebar { display: none; } /* Esconde anúncios laterais no celular */
        }

        /* Estilos do Jogo */
        .header-jogo { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 15px; background: #1a1a1b; border-bottom: 1px solid #333; box-sizing: border-box; }
        .btn-logout { background: #ce3a3a; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        
        #grid { display: grid; gap: 5px; margin: 20px 0; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tile { width: 58px; height: 58px; border: 2px solid #3a3a3c; display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: bold; text-transform: uppercase; }
        .tile.correct { background: var(--cor-correta); border: none; }
        .tile.present { background: var(--cor-lugar-errado); border: none; }
        .tile.absent { background: var(--cor-errada); border: none; }

        #keyboard { display: flex; flex-direction: column; gap: 8px; width: 95%; margin-top: 10px; }
        .kb-row { display: flex; justify-content: center; gap: 5px; }
        .key { padding: 20px 0; background: #818384; border-radius: 4px; color: white; border: none; cursor: pointer; font-size: 0.9rem; font-weight: bold; flex: 1; }
        .key.wide { flex: 1.5; background: #565758; }

        /* Login */
        .auth-card { background: #222; padding: 30px; border-radius: 12px; margin-top: 50px; text-align: center; width: 320px; border: 1px solid #444; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #111; color: white; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 14px; background: var(--cor-correta); border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-layout">
        
        <div class="ad-sidebar">
            </div>

        <div class="game-column">
            
            <div id="auth-screen">
                <div class="auth-card">
                    <h1>Termo Infinito</h1>
                    <input type="text" id="loginNick" placeholder="Nome">
                    <input type="password" id="loginPass" placeholder="Senha">
                    <button class="btn-main" onclick="fazerLogin()">ENTRAR</button>
                    <button onclick="entrarComoConvidado()" style="margin-top:10px; background:none; border:none; color:#777; cursor:pointer;">Convidado</button>
                </div>
            </div>

            <div id="game-container" style="display:none; width: 100%;">
                <div class="header-jogo">
                    <div>👤 <span id="displayNick"></span> | 🔥 <span id="streakDisplay">0</span></div>
                    <button class="btn-logout" onclick="logout()">SAIR</button>
                </div>
                <div id="grid"></div>
                <div id="message" style="height:30px; color:#ffd700; text-align:center; font-weight:bold;"></div>
                <div id="keyboard"></div>
            </div>

        </div>

        <div class="ad-sidebar">
            </div>

    </div>

    <script>
        // Configurações do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCxq9aM8B_XWioHztJhVVLnawlykYD2xs0",
            authDomain: "termo-rank-5d80d.firebaseapp.com",
            databaseURL: "https://termo-rank-5d80d-default-rtdb.firebaseio.com",
            projectId: "termo-rank-5d80d",
            storageBucket: "termo-rank-5d80d.firebasestorage.app",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let nickAtual = ""; let streak = 0; let segredo = ""; let linha = 0; 
        let tentativaArray = ["", "", "", "", ""]; let focadoIndex = 0;
        const PALAVRAS = ["SAGAZ", "AMAGO", "TERMO", "EXITO", "NOBRE", "SENSO", "AFETO", "ALGOZ", "ETICA", "FAZER"];

        async function fazerLogin() {
            const nick = document.getElementById('loginNick').value.trim();
            const pass = document.getElementById('loginPass').value;
            try { await auth.signInWithEmailAndPassword(nick.toLowerCase() + "@termo.com", pass); } catch (e) { alert("Erro!"); }
        }

        function entrarComoConvidado() { nickAtual = "Convidado"; mostrarJogo(); }
        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).once('value').then(snap => {
                    nickAtual = snap.val().nick; streak = snap.val().streak || 0;
                    mostrarJogo();
                });
            }
        });

        function mostrarJogo() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('displayNick').innerText = nickAtual;
            document.getElementById('streakDisplay').innerText = streak;
            novoJogo(); criarTeclado();
        }

        function novoJogo() {
            segredo = PALAVRAS[Math.floor(Math.random() * PALAVRAS.length)].toUpperCase();
            linha = 0; tentativaArray = ["", "", "", "", ""]; focadoIndex = 0;
            const grid = document.getElementById('grid'); grid.innerHTML = "";
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div'); row.className = 'row';
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement('div'); tile.className = 'tile';
                    row.appendChild(tile);
                }
                grid.appendChild(row);
            }
            atualizarVisual();
        }

        function atualizarVisual() {
            const rows = document.querySelectorAll('.row');
            const tiles = rows[linha].querySelectorAll('.tile');
            tiles.forEach((t, i) => { t.innerText = tentativaArray[i]; });
        }

        function digitar(k) {
            if(k === 'ENTER') { if(tentativaArray.join('').length === 5) verificar(); return; }
            if(k === 'DEL') { if(focadoIndex > 0) { focadoIndex--; tentativaArray[focadoIndex] = ""; } }
            else { if(focadoIndex < 5) { tentativaArray[focadoIndex] = k; focadoIndex++; } }
            atualizarVisual();
        }

        function verificar() {
            const tiles = document.querySelectorAll('.row')[linha].querySelectorAll('.tile');
            let acertos = 0;
            for(let i=0; i<5; i++) {
                if(tentativaArray[i] === segredo[i]) { tiles[i].classList.add('correct'); acertos++; }
                else if(segredo.includes(tentativaArray[i])) tiles[i].classList.add('present');
                else tiles[i].classList.add('absent');
            }
            if(acertos === 5) { 
                document.getElementById('message').innerText = "VENCEU!"; 
                setTimeout(novoJogo, 2000); 
            } else { linha++; focadoIndex = 0; tentativaArray = ["","","","",""]; atualizarVisual(); }
        }

        function criarTeclado() {
            const lay = [["Q","W","E","R","T","Y","U","I","O","P"], ["A","S","D","F","G","H","J","K","L"], ["DEL","Z","X","C","V","B","N","M","ENTER"]];
            const kb = document.getElementById('keyboard');
            lay.forEach(r => {
                const div = document.createElement('div'); div.className = 'kb-row';
                r.forEach(k => {
                    const b = document.createElement('button'); b.className = (k.length > 1) ? 'key wide' : 'key';
                    b.innerText = k; b.onclick = () => digitar(k); div.appendChild(b);
                });
                kb.appendChild(div);
            });
        }
    </script>
</body>
</html>

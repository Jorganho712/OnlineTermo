<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termo Infinito - Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --cor-correta: #6aaa64; --cor-errada: #3a3a3c; --preto: #121213; }
        body { background-color: var(--preto); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Estilo das Telas de Login/Cadastro */
        .auth-card { background: #222; padding: 25px; border-radius: 15px; border: 1px solid #444; width: 300px; text-align: center; margin-top: 50px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; outline: none; }
        button { width: 100%; padding: 12px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .btn-main { background: var(--cor-correta); color: white; }
        .btn-link { background: transparent; color: #aaa; text-decoration: underline; font-size: 0.8rem; }
        
        /* Jogo */
        #grid { display: grid; gap: 5px; margin: 15px 0; }
        .row { display: flex; gap: 5px; }
        .tile { width: 45px; height: 45px; border: 2px solid #3a3a3c; display: flex; justify-content: center; align-items: center; font-size: 1.6rem; font-weight: bold; text-transform: uppercase; }
        .correct { background: var(--cor-correta); border: none; }
        .present { background: #c9b458; border: none; }
        .absent { background: var(--cor-errada); border: none; }
        
        #keyboard { display: flex; flex-direction: column; gap: 6px; }
        .key { padding: 14px 8px; background: #818384; border-radius: 4px; color: white; border: none; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="login-screen" class="auth-card">
        <h2>Entrar</h2>
        <input type="email" id="loginEmail" placeholder="E-mail">
        <input type="password" id="loginPass" placeholder="Senha">
        <button class="btn-main" onclick="fazerLogin()">LOGAR</button>
        <button class="btn-link" onclick="alternarTelas('signup-screen')">Não tem conta? Criar uma</button>
    </div>

    <div id="signup-screen" class="auth-card" style="display:none">
        <h2>Criar Conta</h2>
        <input type="text" id="userNick" placeholder="Nome de Usuário (Nick)">
        <input type="email" id="userEmail" placeholder="E-mail">
        <input type="password" id="userPass" placeholder="Senha (mín. 6 dígitos)">
        <button class="btn-main" onclick="criarConta()">CADASTRAR</button>
        <button class="btn-link" onclick="alternarTelas('login-screen')">Já tem conta? Entrar</button>
    </div>

    <div id="game-container" style="display:none">
        <div style="display:flex; justify-content: space-between; width: 300px;">
            <span>👤 <b id="displayNick"></b></span>
            <button onclick="logout()" style="width: auto; padding: 2px 10px; font-size: 0.7rem;">Sair</button>
        </div>
        <div id="stats">Sequência: <span id="streak">0</span></div>
        <div id="grid"></div>
        <div id="message" style="color: #ffd700; height: 20px; margin-bottom: 5px;"></div>
        <div id="keyboard"></div>
    </div>

    <script>
        // CONFIGURAÇÃO (Já com seus dados)
        const firebaseConfig = {
            apiKey: "AIzaSyCxq9aM8B_XWioHztJhVVLnawlykYD2xs0",
            authDomain: "termo-rank-5d80d.firebaseapp.com",
            databaseURL: "https://termo-rank-5d80d-default-rtdb.firebaseio.com",
            projectId: "termo-rank-5d80d",
            storageBucket: "termo-rank-5d80d.firebasestorage.app",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let nickAtual = "";
        let streak = 0;

        // --- FUNÇÕES DE AUTENTICAÇÃO ---

        function alternarTelas(id) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('signup-screen').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }

        async function criarConta() {
            const nick = document.getElementById('userNick').value;
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;

            if(nick.length < 3) return alert("Nick muito curto!");

            try {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                // Salva o nick no banco de dados vinculado ao UID do usuário
                await db.ref('users/' + res.user.uid).set({ nick: nick, streak: 0 });
                alert("Conta criada com sucesso!");
                location.reload();
            } catch (e) { alert("Erro: " + e.message); }
        }

        async function fazerLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) { alert("Erro: " + e.message); }
        }

        function logout() {
            auth.signOut().then(() => location.reload());
        }

        // Monitor de Estado do Usuário (Sempre rodando)
        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).once('value').then(snap => {
                    nickAtual = snap.val().nick;
                    streak = snap.val().streak || 0;
                    document.getElementById('displayNick').innerText = nickAtual;
                    document.getElementById('streak').innerText = streak;
                    
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('signup-screen').style.display = 'none';
                    document.getElementById('game-container').style.display = 'block';
                    
                    novoJogo();
                    criarTeclado();
                });
            }
        });

        // --- LÓGICA DO JOGO (Mesma anterior, mas salvando no UID do user) ---
        const PALAVRAS = ["TERMO", "NOBRE", "SUTIL", "PODER", "MUNDO", "JUSTO", "AREIA", "CARTA", "LIVRO", "FESTA"];
        let segredo = ""; let linha = 0; let tentativa = "";

        function novoJogo() {
            segredo = PALAVRAS[Math.floor(Math.random() * PALAVRAS.length)].toUpperCase();
            linha = 0; tentativa = "";
            document.getElementById('grid').innerHTML = "";
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div'); row.className = 'row';
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement('div'); tile.className = 'tile';
                    row.appendChild(tile);
                }
                document.getElementById('grid').appendChild(row);
            }
        }

        function salvarProgresso() {
            const user = auth.currentUser;
            if (user) {
                db.ref('users/' + user.uid).update({ streak: streak });
                // Também atualiza o ranking global pelo nick
                db.ref('ranking/' + nickAtual).set({ nome: nickAtual, streak: streak });
            }
        }

        // ... (Inclua aqui as funções digitar(), verificar() e criarTeclado() do código anterior)
        // Lembre-se de chamar salvarProgresso() dentro da verificar() quando o acerto ocorrer!
    </script>
</body>
</html>

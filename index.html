<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verbete Online</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script src="//pl29011235.profitablecpmratenetwork.com/c3/34/18/c334186a16a4c0c042d030e9bfcedc2f.js"></script>
    <script src="//pl29010888.profitablecpmratenetwork.com/a4/b5/a8/a4b5a8c3910b3d082855407a6ae50703.js"></script>

    <style>
        :root { --cor-correta: #6aaa64; --cor-lugar-errado: #c9b458; --cor-errada: #3a3a3c; --preto: #121213; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background-color: var(--preto); color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .game-column { width: 100%; max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; height: 100%; position: relative; }
        
        /* Telas */
        #auth-screen, #rank-screen, #register-screen, #out-of-lives { position: absolute; inset: 0; background: var(--preto); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .card { background: #222; padding: 20px; border-radius: 12px; width: 90%; text-align: center; border: 1px solid #333; }
        
        .btn-main { width: 100%; padding: 12px; background: var(--cor-correta); border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .btn-ad { background: #4a90e2; } /* Cor azul para botões de anúncio */
        
        /* Jogo */
        #game-container { display: none; flex-direction: column; height: 100%; }
        .header-jogo { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #1a1a1b; font-size: 11px; }
        
        #grid { display: grid; gap: 4px; padding: 10px; justify-content: center; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .tile { width: 45px; height: 45px; border: 2px solid #3a3a3c; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .tile.selected { border-color: #818384; }
        .tile.correct { background: var(--cor-correta); border: none; }
        .tile.present { background: var(--cor-lugar-errado); border: none; }
        .tile.absent { background: var(--cor-errada); border: none; }

        #keyboard { padding: 5px; margin-top: auto; }
        .kb-row { display: flex; justify-content: center; gap: 3px; margin-bottom: 4px; }
        .key { height: 42px; background: #818384; border-radius: 4px; color: white; border: none; font-size: 0.8rem; flex: 1; cursor: pointer; }
        
        .stats-bar { display: flex; gap: 10px; }
        .hint-count { color: #c9b458; font-weight: bold; }
    </style>
</head>
<body onkeydown="tecladoFisico(event)">

    <div class="game-column">
        <div id="auth-screen">
            <div class="card">
                <h2>Termo Pro</h2>
                <input type="text" id="loginNick" placeholder="Nome">
                <input type="password" id="loginPass" placeholder="Senha">
                <button class="btn-main" onclick="fazerLogin()">JOGAR</button>
                <button onclick="entrarComoConvidado()" style="background:none; border:none; color:#777; margin-top:10px;">Visitante</button>
            </div>
        </div>

        <div id="out-of-lives" style="display:none;">
            <div class="card">
                <h3>Vidas Esgotadas! 💔</h3>
                <p>Você já jogou suas 3 partidas diárias.</p>
                <button class="btn-main btn-ad" onclick="ganharVidaExtra()">Assistir Vídeo (+1 Vida)</button>
                <p style="font-size: 10px; color: #666; margin-top: 10px;">Vidas resetam à meia-noite.</p>
            </div>
        </div>

        <div id="game-container">
            <div class="header-jogo">
                <div class="stats-bar">
                    <span>🔥 <b id="streakDisplay">0</b></span>
                    <span>❤️ <b id="livesDisplay">3</b></span>
                    <span>💡 <b id="hintsDisplay">2</b></span>
                </div>
                <div>
                    <button onclick="revelarComAnuncio()" id="btnHint" style="background:#c9b458; border:none; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:10px;">REVELAR</button>
                    <button onclick="pularComAnuncio()" style="background:#4a90e2; border:none; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:10px; color:white;">PULAR</button>
                </div>
            </div>
            
            <div id="game-area">
                <div id="grid"></div>
                <div id="message" style="text-align:center; color:#ffd700; min-height:20px; margin-top:10px;"></div>
            </div>

            <div id="keyboard"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* SEU CONFIG AQUI */ };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();

        const SMARTLINK = "https://www.profitablecpmratenetwork.com/sw8yv06j5g?key=edf6d59c2cca79eb989069841f9cb072";
        const PALAVRAS = ["SAGAZ", "AMAGO", "TERMO", "EXITO", "NOBRE", "SENSO", "AFETO", "ALGOZ", "ETICA", "FAZER", "PODER", "VIVER", "JUSTO", "IDEIA"];
        
        let nickAtual = ""; let streak = 0; let segredo = ""; let linha = 0; 
        let tentativaArray = ["", "", "", "", ""]; let focadoIndex = 0;
        let vidas = 3; let dicasRestantes = 2;

        function entrarComoConvidado() { nickAtual = "Visitante"; mostrarJogo(); }
        function fazerLogin() { /* lógica de login */ mostrarJogo(); }

        function mostrarJogo() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            checkVidas();
            novoJogo();
            criarTecladoVisual();
        }

        function checkVidas() {
            if (vidas <= 0) {
                document.getElementById('out-of-lives').style.display = 'flex';
                document.getElementById('game-container').style.display = 'none';
            } else {
                document.getElementById('out-of-lives').style.display = 'none';
                document.getElementById('game-container').style.display = 'flex';
            }
            document.getElementById('livesDisplay').innerText = vidas;
        }

        function novoJogo() {
            segredo = PALAVRAS[Math.floor(Math.random() * PALAVRAS.length)].toUpperCase();
            linha = 0; tentativaArray = ["", "", "", "", ""]; focadoIndex = 0; dicasRestantes = 2;
            document.getElementById('hintsDisplay').innerText = dicasRestantes;
            const grid = document.getElementById('grid'); grid.innerHTML = "";
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div'); row.className = 'row';
                for (let j = 0; j < 5; j++) {
                    const t = document.createElement('div'); t.className = 'tile';
                    t.onclick = () => { if(i===linha) { focadoIndex=j; atualizarVisual(); } };
                    row.appendChild(t);
                }
                grid.appendChild(row);
            }
            atualizarVisual();
        }

        // --- MECÂNICA DE ANÚNCIOS ---
        
        function ganharVidaExtra() {
            window.open(SMARTLINK, '_blank');
            vidas++;
            checkVidas();
        }

        function revelarComAnuncio() {
            if (dicasRestantes > 0) {
                window.open(SMARTLINK, '_blank'); // Abre anúncio
                tentativaArray[focadoIndex] = segredo[focadoIndex];
                dicasRestantes--;
                document.getElementById('hintsDisplay').innerText = dicasRestantes;
                atualizarVisual();
            } else {
                alert("Limite de 2 dicas por palavra atingido!");
            }
        }

        function pularComAnuncio() {
            if (confirm("Assistir anúncio para pular esta palavra sem perder seu streak?")) {
                window.open(SMARTLINK, '_blank');
                novoJogo();
            }
        }

        // --- LÓGICA DE TECLADO E VERIFICAÇÃO (IGUAL ANTERIOR) ---

        function digitar(k) {
            if(k === 'ENTER') { if(tentativaArray.join('').length === 5) verificar(); return; }
            if(k === 'DEL' || k === 'BACKSPACE') { 
                tentativaArray[focadoIndex] = "";
                if(focadoIndex > 0) focadoIndex--;
            } else { 
                if(focadoIndex < 5) { tentativaArray[focadoIndex] = k; if(focadoIndex < 4) focadoIndex++; } 
            }
            atualizarVisual();
        }

        function verificar() {
            const tiles = document.querySelectorAll('.row')[linha].querySelectorAll('.tile');
            let ok = 0;
            for(let i=0; i<5; i++) {
                if(tentativaArray[i] === segredo[i]) { tiles[i].classList.add('correct'); ok++; }
                else if(segredo.includes(tentativaArray[i])) tiles[i].classList.add('present');
                else tiles[i].classList.add('absent');
            }
            if(ok === 5) { 
                document.getElementById('message').innerText = "VENCEU! 🎉"; 
                streak++; document.getElementById('streakDisplay').innerText = streak;
                setTimeout(novoJogo, 2000); 
            } else if(linha === 5) {
                vidas--;
                checkVidas();
                if(vidas > 0) setTimeout(novoJogo, 3000);
            } else { 
                linha++; focadoIndex = 0; tentativaArray = ["","","","",""]; 
                setTimeout(atualizarVisual, 100);
            }
        }

        function atualizarVisual() {
            const rows = document.querySelectorAll('.row');
            if(!rows[linha]) return;
            const tiles = rows[linha].querySelectorAll('.tile');
            tiles.forEach((t, i) => { 
                t.innerText = tentativaArray[i]; 
                t.classList.remove('selected');
                if(i === focadoIndex) t.classList.add('selected');
            });
        }

        function tecladoFisico(e) {
            const k = e.key.toUpperCase();
            if(k === 'ENTER') digitar('ENTER');
            else if(k === 'BACKSPACE') digitar('DEL');
            else if(k.length === 1 && k.match(/[A-Z]/)) digitar(k);
        }

        function criarTecladoVisual() {
            const lay = [["Q","W","E","R","T","Y","U","I","O","P"], ["A","S","D","F","G","H","J","K","L"], ["DEL","Z","X","C","V","B","N","M","ENTER"]];
            const kb = document.getElementById('keyboard'); kb.innerHTML = "";
            lay.forEach(r => {
                const div = document.createElement('div'); div.className = 'kb-row';
                r.forEach(k => {
                    const b = document.createElement('button'); b.className = 'key';
                    b.innerText = k; b.onclick = () => digitar(k); div.appendChild(b);
                });
                kb.appendChild(div);
            });
        }
    </script>
</body>
</html>

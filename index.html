<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Verbete Online</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --cor-correta: #6aaa64; --cor-lugar-errado: #c9b458; --cor-errada: #3a3a3c; --preto: #121213; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background-color: var(--preto); color: white; font-family: sans-serif; margin: 0; overflow: hidden; width: 100%; height: 100%; }

        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .overlay.active { display: flex; }

        .card { background: #222; padding: 25px; border-radius: 12px; width: 100%; max-width: 320px; text-align: center; border: 1px solid #333; }
        .btn-main { width: 100%; padding: 14px; background: var(--cor-correta); border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-main:disabled { background: #555 !important; cursor: not-allowed; opacity: 0.6; }
        
        .game-column { width: 100%; max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; height: 100dvh; position: relative; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1a1a1b; border-bottom: 1px solid #333; }
        .nav-icons { display: flex; gap: 15px; }
        .nav-btn { background: none; border: none; color: white; cursor: pointer; font-size: 20px; padding: 5px; }

        #rank-list { text-align: left; margin: 15px 0; max-height: 250px; overflow-y: auto; background: #111; padding: 10px; border-radius: 8px; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333; font-size: 14px; }

        #grid { display: grid; gap: 5px; padding: 10px; margin-top: 20px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tile { width: 13vw; height: 13vw; max-width: 55px; max-height: 55px; border: 2px solid #3a3a3c; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; font-weight: bold; text-transform: uppercase; }
        .tile.correct { background: var(--cor-correta); border: none; }
        .tile.present { background: var(--cor-lugar-errado); border: none; }
        .tile.absent { background: var(--cor-errada); border: none; }

        #keyboard { padding: 5px; padding-bottom: 20px; }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 6px; }
        .key { height: 50px; background: #818384; border-radius: 4px; color: white; border: none; font-size: 0.75rem; font-weight: bold; flex: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="game-column">
        <div id="auth-screen" class="overlay active">
            <div class="card">
                <h1>Verbete</h1>
                <input type="text" id="loginNick" style="width:100%; padding:12px; margin-bottom:8px; background:#111; color:white; border:1px solid #444; border-radius:5px;" placeholder="Nome">
                <input type="password" id="loginPass" style="width:100%; padding:12px; margin-bottom:8px; background:#111; color:white; border:1px solid #444; border-radius:5px;" placeholder="Senha">
                <button class="btn-main" onclick="fazerLogin()">Jogar</button>
                <button style="background:none; border:none; color:#777; margin-top:15px; cursor:pointer;" onclick="entrarComoConvidado()">Entrar como Visitante</button>
            </div>
        </div>

        <div id="rank-screen" class="overlay">
            <div class="card">
                <h2>🏆 Ranking Global</h2>
                <div id="rank-list">Carregando...</div>
                <button class="btn-main" onclick="fecharTelas()">Voltar</button>
            </div>
        </div>

        <div id="out-of-lives" class="overlay">
            <div class="card">
                <h2>Limite Atingido!</h2>
                <p id="ad-status-text">Assista um anúncio para jogar mais 3 vezes.</p>
                <button id="btn-ad-reset" class="btn-main" onclick="assistirAnuncioReset()" style="background:#4a90e2;">🎬 LIBERAR +3 JOGOS</button>
                <button style="background:none; border:none; color:#888; margin-top:15px; cursor:pointer;" onclick="fazerLogout()">Sair</button>
            </div>
        </div>

        <div id="game-container" style="display:none; flex-direction:column; height:100%;">
            <div class="top-nav">
                <div style="font-weight:bold;">👤 <span id="displayNick"></span> | 🔥 <span id="streakDisplay">0</span></div>
                <div class="nav-icons">
                    <button class="nav-btn" onclick="abrirRanking()">🏆</button>
                    <button class="nav-btn" onclick="fazerLogout()">🚪</button>
                </div>
            </div>
            
            <div id="game-area">
                <div id="grid"></div>
                <div id="message" style="color:#ffd700; font-weight:bold; height:20px; text-align:center; margin-top:10px;"></div>
            </div>

            <div style="display:flex; justify-content:center; gap:10px; padding:10px;">
                <button onclick="usarDica()" style="flex:1; padding:12px; background:#c9b458; border:none; border-radius:6px; color:white; font-weight:bold;">💡 DICA</button>
                <button id="btn-skip" onclick="pularPalavra()" style="flex:1; padding:12px; background:#4a90e2; border:none; border-radius:6px; color:white; font-weight:bold;">⏭️ PULAR (1x)</button>
            </div>
            <div id="keyboard"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCxq9aM8B_XWioHztJhVVLnawlykYD2xs0", authDomain: "termo-rank-5d80d.firebaseapp.com", databaseURL: "https://termo-rank-5d80d-default-rtdb.firebaseio.com", projectId: "termo-rank-5d80d", storageBucket: "termo-rank-5d80d.firebasestorage.app" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();
        const SMARTLINK = "https://www.profitablecpmratenetwork.com/sw8yv06j5g?key=edf6d59c2cca79eb989069841f9cb072";
        const DICIONARIO = ["SAGAZ", "AMAGO", "TERMO", "EXITO", "NOBRE", "SENSO", "AFETO", "ALGOZ", "ETICA", "FAZER", "PODER", "VIVER", "JUSTO", "IDEIA", "MUITO", "SONHO", "TEMPO", "VALOR", "BRAVO", "FORTE", "GRITO", "MUNDO"];

        let nickAtual = ""; let streak = 0; let segredo = ""; let linha = 0; 
        let tentativaArray = ["","","","",""]; let focadoIndex = 0;
        let partidasHj = 0; let skipUsado = false; let adResetUsado = false;

        function abrirTela(id) { document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function fecharTelas() { document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active')); }
        function abrirRanking() { abrirTela('rank-screen'); carregarRank(); }
        function fazerLogout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if(user) {
                db.ref('users/'+user.uid).on('value', async s => {
                    const d = s.val() || {};
                    nickAtual = d.nick || "Jogador"; streak = d.streak || 0;
                    const hj = new Date().toLocaleDateString();
                    if(d.lastDate !== hj) {
                        await db.ref('users/'+user.uid).update({ lastDate: hj, gamesToday: 0, skipUsed: false, adResetUsed: false });
                        partidasHj = 0; skipUsado = false; adResetUsado = false;
                    } else {
                        partidasHj = d.gamesToday || 0; skipUsado = d.skipUsed || false; adResetUsado = d.adResetUsed || false;
                    }

                    if(partidasHj >= 3 && !adResetUsado) {
                        document.getElementById('game-container').style.display='none';
                        abrirTela('out-of-lives');
                    } else if(partidasHj >= 6 || (partidasHj >= 3 && adResetUsado)) {
                        document.getElementById('game-container').style.display='none';
                        abrirTela('out-of-lives');
                        document.getElementById('btn-ad-reset').disabled = true;
                        document.getElementById('btn-ad-reset').innerText = "LIMITE DIÁRIO ATINGIDO";
                    } else {
                        fecharTelas();
                        document.getElementById('game-container').style.display='flex';
                        document.getElementById('displayNick').innerText = nickAtual;
                        document.getElementById('streakDisplay').innerText = streak;
                        if(skipUsado) { document.getElementById('btn-skip').disabled = true; document.getElementById('btn-skip').innerText = "PULO USADO"; }
                        novoJogo();
                    }
                });
            }
        });

        async function carregarRank() {
            const list = document.getElementById('rank-list');
            db.ref('users').orderByChild('streak').limitToLast(10).once('value', s => {
                list.innerHTML = "";
                let arr = []; s.forEach(c => arr.push(c.val()));
                arr.reverse().forEach((u, i) => {
                    list.innerHTML += `<div class="rank-item"><span>${i+1}º ${u.nick}</span> <span>🔥 ${u.streak || 0}</span></div>`;
                });
            });
        }

        async function assistirAnuncioReset() {
            if(adResetUsado) return;
            window.open(SMARTLINK);
            if(auth.currentUser) await db.ref('users/'+auth.currentUser.uid).update({ adResetUsed: true, gamesToday: 0 });
        }

        async function pularPalavra() {
            if(skipUsado || nickAtual === "Visitante") return;
            window.open(SMARTLINK);
            if(auth.currentUser) await db.ref('users/'+auth.currentUser.uid).update({ skipUsed: true, streak: streak + 1, gamesToday: partidasHj + 1 });
        }

        function novoJogo() {
            segredo = DICIONARIO[Math.floor(Math.random()*DICIONARIO.length)];
            linha=0; tentativaArray=["","","","",""]; focadoIndex=0;
            const g = document.getElementById('grid'); g.innerHTML="";
            for(let i=0;i<6;i++){
                const r=document.createElement('div'); r.className='row';
                for(let j=0;j<5;j++) { const t=document.createElement('div'); t.className='tile'; r.appendChild(t); }
                g.appendChild(r);
            }
            criarTeclado(); atualizarVisual();
        }

        function criarTeclado() {
            const lay=[["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["DEL","Z","X","C","V","B","N","M","ENTER"]];
            const kb=document.getElementById('keyboard'); kb.innerHTML="";
            lay.forEach(r=>{
                const d=document.createElement('div'); d.className='kb-row';
                r.forEach(k=>{
                    const b=document.createElement('button');
                    b.className=(k.length>1)?'key wide':'key'; b.innerText=k;
                    b.onclick=()=>digitar(k); d.appendChild(b);
                });
                kb.appendChild(d);
            });
        }

        function digitar(k) {
            if(k==='ENTER') { if(tentativaArray.join('').length===5) verificar(); }
            else if(k==='DEL') { tentativaArray[focadoIndex]=""; if(focadoIndex>0) focadoIndex--; }
            else { if(focadoIndex<5) { tentativaArray[focadoIndex]=k; if(focadoIndex<4) focadoIndex++; } }
            atualizarVisual();
        }

        async function verificar() {
            const chute = tentativaArray.join('');
            if(!DICIONARIO.includes(chute)) { document.getElementById('message').innerText="Inválida!"; return; }
            const ts = document.querySelectorAll('.row')[linha].querySelectorAll('.tile');
            let acertos = 0;
            for(let i=0; i<5; i++) {
                if(tentativaArray[i] === segredo[i]) { ts[i].classList.add('correct'); acertos++; }
                else if(segredo.includes(tentativaArray[i])) ts[i].classList.add('present');
                else ts[i].classList.add('absent');
            }
            if(acertos === 5) {
                if(auth.currentUser) await db.ref('users/'+auth.currentUser.uid).update({ streak: streak + 1, gamesToday: partidasHj + 1 });
                setTimeout(novoJogo, 1500);
            } else if(linha === 5) {
                if(auth.currentUser) await db.ref('users/'+auth.currentUser.uid).update({ streak: 0, gamesToday: partidasHj + 1 });
                setTimeout(novoJogo, 2000);
            } else { linha++; focadoIndex=0; tentativaArray=["","","","",""]; atualizarVisual(); }
        }

        function atualizarVisual() {
            const row = document.querySelectorAll('.row')[linha]; if(!row) return;
            const ts = row.querySelectorAll('.tile');
            ts.forEach((t, i) => { t.innerText = tentativaArray[i]; });
        }

        function entrarComoConvidado() { nickAtual = "Visitante"; fecharTelas(); document.getElementById('game-container').style.display='flex'; novoJogo(); }
        async function fazerLogin() {
            const n = document.getElementById('loginNick').value.trim(); const p = document.getElementById('loginPass').value;
            if(!n || !p) return alert("Preencha!");
            try { await auth.signInWithEmailAndPassword(n.toLowerCase()+"@termo.com", p); } 
            catch(e) { 
                const res = await auth.createUserWithEmailAndPassword(n.toLowerCase()+"@termo.com", p);
                await db.ref('users/'+res.user.uid).set({nick:n, streak:0, gamesToday:0, skipUsed:false, adResetUsed:false});
            }
        }
    </script>
</body>
</html>

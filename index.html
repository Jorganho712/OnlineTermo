<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Verbete Online</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script src="//pl29011235.profitablecpmratenetwork.com/c3/34/18/c334186a16a4c0c042d030e9bfcedc2f.js"></script>
    <script src="//pl29010888.profitablecpmratenetwork.com/a4/b5/a8/a4b5a8c3910b3d082855407a6ae50703.js"></script>

    <style>
        :root { --cor-correta: #6aaa64; --cor-lugar-errado: #c9b458; --cor-errada: #3a3a3c; --preto: #121213; }
        * { box-sizing: border-box; touch-action: manipulation; }
        
        body { background-color: var(--preto); color: white; font-family: sans-serif; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }

        .game-column { width: 100%; max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; height: 100dvh; }

        /* TECLADO E GRIDS */
        #game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #grid { display: grid; gap: 4px; padding: 5px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .tile { width: 11vw; height: 11vw; max-width: 45px; max-height: 45px; border: 2px solid #3a3a3c; display: flex; justify-content: center; align-items: center; font-size: 1.3rem; font-weight: bold; text-transform: uppercase; }
        .tile.correct { background: var(--cor-correta); border: none; }
        .tile.present { background: var(--cor-lugar-errado); border: none; }
        .tile.absent { background: var(--cor-errada); border: none; }

        .hint-panel { text-align: center; color: #ffd700; font-size: 14px; font-weight: bold; min-height: 20px; }
        .action-bar { display: flex; justify-content: center; gap: 10px; padding: 8px; }
        .btn-action { flex: 1; max-width: 120px; padding: 10px; border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 11px; cursor: pointer; }

        #keyboard { padding: 5px; padding-bottom: max(15px, env(safe-area-inset-bottom)); }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 5px; }
        .key { height: 45px; background: #818384; border-radius: 4px; color: white; border: none; font-size: 0.8rem; font-weight: bold; flex: 1; cursor: pointer; }
        .key.absent { background: #1a1a1b !important; color: #3a3a3c !important; pointer-events: none; }
        .key.wide { flex: 1.5; }

        /* TELAS */
        #auth-screen, #out-of-lives { position: absolute; inset: 0; background: var(--preto); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .card { background: #222; padding: 25px; border-radius: 12px; width: 90%; text-align: center; border: 1px solid #333; }
        .btn-main { width: 100%; padding: 14px; background: var(--cor-correta); border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="game-column">
        <div id="auth-screen">
            <div class="card">
                <h2>Verbete Online</h2>
                <input type="text" id="loginNick" style="width:100%; padding:10px; margin-bottom:5px;" placeholder="Nome">
                <input type="password" id="loginPass" style="width:100%; padding:10px;" placeholder="Senha">
                <button class="btn-main" onclick="fazerLogin()">ENTRAR</button>
                <button style="background:none; border:none; color:#888; margin-top:15px; cursor:pointer;" onclick="entrarComoConvidado()">Entrar como Visitante</button>
            </div>
        </div>

        <div id="out-of-lives" style="display:none;">
            <div class="card">
                <h3>Limite de Jogos Diários!</h3>
                <p>Você já jogou as 3 partidas de hoje.</p>
                <button class="btn-main" onclick="abrirAnuncioVida()" style="background:#4a90e2">Ganhar +1 Jogo (Anúncio)</button>
            </div>
        </div>

        <div id="game-container" style="display:none; flex-direction:column; height:100%;">
            <div style="padding:10px; text-align:center; border-bottom:1px solid #333; font-size:12px;">
                👤 <span id="displayNick"></span> | 🔥 <span id="streakDisplay">0</span> | ❤️ <span id="livesDisplay">3</span>
            </div>
            
            <div id="game-area">
                <div id="grid"></div>
                <div id="message" style="color:#ffd700; margin-top:10px; height:20px; font-weight:bold;"></div>
            </div>

            <div id="hint-display" class="hint-panel"></div>
            <div class="action-bar">
                <button class="btn-action" onclick="usarDica()" style="background:#c9b458;">💡 Dica</button>
                <button id="btn-skip" class="btn-action" onclick="pularPalavra()" style="background:#4a90e2;">⏭️ Pular (1x)</button>
            </div>

            <div id="keyboard"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCxq9aM8B_XWioHztJhVVLnawlykYD2xs0", authDomain: "termo-rank-5d80d.firebaseapp.com", databaseURL: "https://termo-rank-5d80d-default-rtdb.firebaseio.com", projectId: "termo-rank-5d80d", storageBucket: "termo-rank-5d80d.firebasestorage.app" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();
        const SMARTLINK = "https://www.profitablecpmratenetwork.com/sw8yv06j5g?key=edf6d59c2cca79eb989069841f9cb072";
        
        let nickAtual = ""; let streak = 0; let segredo = ""; let linha = 0; 
        let tentativaArray = ["","","","",""]; let focadoIndex = 0;
        let vidas = 3; let letrasErradas = new Set();
        let listaPalavras = ["SAGAZ", "AMAGO", "TERMO", "EXITO", "NOBRE", "SENSO", "AFETO", "ALGOZ", "ETICA", "FAZER", "PODER", "VIVER", "JUSTO", "IDEIA", "MUITO", "SONHO", "TEMPO", "VALOR", "BRAVO", "FORTE", "GRITO", "MUNDO"];

        // COMANDOS DE CONSOLE
        window.revelar = () => { console.log("A palavra é: " + segredo); return "Revelado no console!"; };
        window.liberar = async () => {
            vidas = 1;
            if(auth.currentUser) await db.ref('users/'+auth.currentUser.uid).update({ gamesToday: 0 });
            mostrarJogo();
            return "Acesso liberado! Jogue novamente.";
        };

        async function fazerLogin() {
            const n = document.getElementById('loginNick').value.trim(); const p = document.getElementById('loginPass').value;
            try { await auth.signInWithEmailAndPassword(n.toLowerCase()+"@termo.com", p); } catch(e){ alert("Erro no login!"); }
        }

        function entrarComoConvidado() { nickAtual = "Visitante"; vidas = 3; mostrarJogo(); }

        auth.onAuthStateChanged(async user => {
            if(user) {
                db.ref('users/'+user.uid).on('value', async s => {
                    const data = s.val();
                    nickAtual = data.nick;
                    streak = data.streak || 0;
                    
                    // Lógica de 3 vezes ao dia
                    const hoje = new Date().toLocaleDateString();
                    if(data.lastDate !== hoje) {
                        await db.ref('users/'+user.uid).update({ lastDate: hoje, gamesToday: 0 });
                        vidas = 3;
                    } else {
                        vidas = 3 - (data.gamesToday || 0);
                    }
                    mostrarJogo();
                });
            }
        });

        function mostrarJogo() {
            if(vidas <= 0) {
                document.getElementById('game-container').style.display='none';
                document.getElementById('out-of-lives').style.display='flex';
                return;
            }
            document.getElementById('auth-screen').style.display='none';
            document.getElementById('out-of-lives').style.display='none';
            document.getElementById('game-container').style.display='flex';
            document.getElementById('displayNick').innerText = nickAtual;
            document.getElementById('livesDisplay').innerText = vidas;
            document.getElementById('streakDisplay').innerText = streak;
            novoJogo();
        }

        function novoJogo() {
            // Evitar palavras repetidas
            let disponiveis = listaPalavras.filter(p => p !== segredo);
            segredo = disponiveis[Math.floor(Math.random()*disponiveis.length)];
            
            linha=0; tentativaArray=["","","","",""]; focadoIndex=0; letrasErradas.clear();
            document.getElementById('hint-display').innerText = "";
            document.getElementById('message').innerText = "";
            const g = document.getElementById('grid'); g.innerHTML="";
            for(let i=0;i<6;i++){
                const r=document.createElement('div'); r.className='row';
                for(let j=0;j<5;j++){ const t=document.createElement('div'); t.className='tile'; r.appendChild(t); }
                g.appendChild(r);
            }
            criarTeclado();
            atualizarVisual();
        }

        function criarTeclado() {
            const lay=[["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["DEL","Z","X","C","V","B","N","M","ENTER"]];
            const kb=document.getElementById('keyboard'); kb.innerHTML="";
            lay.forEach(r=>{
                const d=document.createElement('div'); d.className='kb-row';
                r.forEach(k=>{
                    const b=document.createElement('button');
                    b.className = (k.length>1) ? 'key wide' : 'key';
                    b.id = "key-" + k;
                    b.innerText = k;
                    if(letrasErradas.has(k)) b.classList.add('absent');
                    b.onclick = () => digitar(k);
                    d.appendChild(b);
                });
                kb.appendChild(d);
            });
        }

        function digitar(k) {
            if(k==='ENTER') { if(tentativaArray.join('').length===5) verificar(); }
            else if(k==='DEL') { tentativaArray[focadoIndex]=""; if(focadoIndex>0) focadoIndex--; }
            else { if(focadoIndex<5) { tentativaArray[focadoIndex]=k; if(focadoIndex<4) focadoIndex++; } }
            atualizarVisual();
        }

        async function verificar() {
            const ts = document.querySelectorAll('.row')[linha].querySelectorAll('.tile');
            let acertos = 0;
            let chute = tentativaArray.join('');

            for(let i=0; i<5; i++) {
                const letra = tentativaArray[i];
                if(letra === segredo[i]) { ts[i].classList.add('correct'); acertos++; }
                else if(segredo.includes(letra)) { ts[i].classList.add('present'); }
                else { 
                    ts[i].classList.add('absent'); 
                    letrasErradas.add(letra);
                    document.getElementById("key-"+letra)?.classList.add('absent');
                }
            }

            if(acertos === 5) {
                streak++;
                await finalizarPartida(true);
                document.getElementById('message').innerText = "Excelente!";
                setTimeout(mostrarJogo, 2000);
            } else if(linha === 5) {
                streak = 0;
                await finalizarPartida(true);
                document.getElementById('message').innerText = "Palavra: " + segredo;
                setTimeout(mostrarJogo, 3000);
            } else {
                linha++; focadoIndex=0; tentativaArray=["","","","",""];
                atualizarVisual();
            }
        }

        async function finalizarPartida(contarVida) {
            if(nickAtual !== "Visitante") {
                const userRef = db.ref('users/'+auth.currentUser.uid);
                const s = await userRef.once('value');
                const nJogos = (s.val().gamesToday || 0) + (contarVida ? 1 : 0);
                await userRef.update({ streak: streak, gamesToday: nJogos });
            } else if(contarVida) {
                vidas--;
            }
        }

        function atualizarVisual() {
            const row = document.querySelectorAll('.row')[linha];
            const ts = row.querySelectorAll('.tile');
            ts.forEach((t, i) => {
                t.innerText = tentativaArray[i];
                t.style.borderColor = (i === focadoIndex) ? "#818384" : "#3a3a3c";
            });
        }

        function usarDica() {
            window.open(SMARTLINK);
            const letra = segredo[Math.floor(Math.random()*5)];
            document.getElementById('hint-display').innerText = "DICA: Possui a letra " + letra;
        }

        async function pularPalavra() {
            if(nickAtual === "Visitante") return alert("Crie uma conta!");
            window.open(SMARTLINK);
            streak++;
            await finalizarPartida(true);
            document.getElementById('message').innerText = "PULOU! Era: " + segredo;
            setTimeout(mostrarJogo, 2000);
        }

        function abrirAnuncioVida() { window.open(SMARTLINK); vidas = 1; mostrarJogo(); }
    </script>
</body>
</html>

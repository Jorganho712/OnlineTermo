<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Verbete Online - VIP Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --cor-correta: #6aaa64; --cor-lugar-errado: #c9b458; --cor-errada: #3a3a3c; --preto: #121213; --selecionado: #ffd700; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background-color: var(--preto); color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100dvh; display: flex; align-items: center; justify-content: center; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .overlay.active { display: flex; }

        .card { background: #222; padding: 25px; border-radius: 15px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #333; }
        .btn-main { width: 100%; padding: 14px; background: var(--cor-correta); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-sec { width: 100%; padding: 12px; background: transparent; border: 2px solid #444; color: #aaa; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        
        .list-container { text-align: left; margin: 10px 0; max-height: 250px; overflow-y: auto; background: #111; padding: 10px; border-radius: 8px; border: 1px solid #444; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        .buy-btn { background: #4a90e2; border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }

        .game-column { width: 100%; max-width: 450px; display: flex; flex-direction: column; height: 100%; position: relative; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1a1a1b; border-bottom: 1px solid #333; }
        .nav-icons { display: flex; gap: 15px; }
        .nav-icons button { background: none; border: none; color: white; cursor: pointer; font-size: 20px; padding: 0; }
        
        #grid { display: grid; gap: 5px; padding: 10px; margin: auto; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tile { width: 60px; height: 60px; border: 2px solid #3a3a3c; display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .tile.focused { border-color: var(--selecionado) !important; }
        .tile.correct { background: var(--cor-correta); border: none; }
        .tile.present { background: var(--cor-lugar-errado); border: none; }
        .tile.absent { background: var(--cor-errada); border: none; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-5px); } 40%, 80% { transform: translateX(5px); } }
        .shake { animation: shake 0.4s; }

        .key { height: 55px; background: #818384; border-radius: 4px; color: white; border: none; font-size: 1rem; font-weight: bold; flex: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .key.wide { flex: 1.5; background: #565758; }
        .key.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="game-column">
        <div id="auth-screen" class="overlay active">
            <div class="card">
                <h1>VERBETE</h1>
                <input type="text" id="loginNick" style="width:100%; padding:14px; margin-bottom:10px; background:#111; color:white; border:1px solid #444; border-radius:8px;" placeholder="Nome">
                <input type="password" id="loginPass" style="width:100%; padding:14px; margin-bottom:10px; background:#111; color:white; border:1px solid #444; border-radius:8px;" placeholder="Senha">
                <button class="btn-main" onclick="fazerLogin()">Entrar</button>
                <button class="btn-sec" onclick="criarConta()">Criar Conta</button>
            </div>
        </div>

        <div id="tutorial-screen" class="overlay">
            <div class="card">
                <h2>Como Jogar?</h2>
                <p style="text-align: left; font-size: 14px; line-height: 1.6;">
                    • Descubra a palavra de 5 letras em 6 tentativas.<br>
                    • <span style="color:var(--cor-correta)">VERDE</span>: Letra na posição certa.<br>
                    • <span style="color:var(--cor-lugar-errado)">AMARELO</span>: Letra existe, mas no lugar errado.<br>
                    • <b>DICA</b>: Clique em qualquer quadrado para editar a letra!
                </p>
                <button class="btn-main" onclick="fecharTelas()">Entendi!</button>
            </div>
        </div>

        <div id="shop-screen" class="overlay">
            <div class="card">
                <h2>🛒 Loja</h2>
                <p>💰 Moedas: <span id="shopCoinsDisplay">0</span></p>
                <div id="shop-content" class="list-container"></div>
                <button class="btn-main" style="background:#333" onclick="fecharTelas()">Sair</button>
            </div>
        </div>

        <div id="game-container" style="display:none; flex-direction:column; height:100%;">
            <div class="top-nav">
                <div style="font-weight:bold; font-size: 13px;">🔥 <span id="streakDisplay">0</span> | 💰 <span id="coinsDisplay">0</span></div>
                <div class="nav-icons">
                    <button onclick="document.getElementById('tutorial-screen').classList.add('active')">❓</button>
                    <button onclick="abrirLoja()">🛒</button>
                    <button onclick="fazerLogout()">🚪</button>
                </div>
            </div>
            <div id="grid"></div>
            <div id="message" style="color:#ffd700; font-weight:bold; height:20px; text-align:center; margin-bottom:10px;"></div>
            <div style="padding:0 10px 10px 10px;"><button onclick="pularPalavra()" style="width:100%; padding:12px; background:#4a90e2; border:none; border-radius:6px; color:white; font-weight:bold;">⏭️ PULAR</button></div>
            <div id="keyboard" style="padding: 10px;"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCxq9aM8B_XWioHztJhVVLnawlykYD2xs0", authDomain: "termo-rank-5d80d.firebaseapp.com", databaseURL: "https://termo-rank-5d80d-default-rtdb.firebaseio.com", projectId: "termo-rank-5d80d", storageBucket: "termo-rank-5d80d.firebasestorage.app" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();
        const SMARTLINK = "https://www.profitablecpmratenetwork.com/sw8yv06j5g?key=edf6d59c2cca79eb989069841f9cb072";
        const SEGREDO_POOL = ["SAGAZ", "AMAGO", "TERMO", "EXITO", "NOBRE", "SENSO", "AFETO", "ALGOZ", "ETICA", "FAZER", "PODER", "VIVER", "JUSTO", "IDEIA", "MUITO", "SONHO", "TEMPO", "VALOR", "BRAVO", "FORTE", "GRITO", "MUNDO", "COCOS", "CASAS", "PORTA", "MESA", "LIVRO", "FOGO", "AGUA", "VENTO", "TERRA", "AREIA", "PLANO"];

        let userLocal = {}; let segredo = ""; let linha = 0; let focadoIndex = 0;
        let tentativaArray = ["","","","",""];
        let letrasErradas = new Set();

        function limparTexto(str) { return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase(); }
        function fecharTelas() { document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active')); }

        function abrirLoja() {
            document.getElementById('shop-screen').classList.add('active');
            document.getElementById('shopCoinsDisplay').innerText = userLocal.coins || 0;
            const items = [{id:'c1', nome:'Cor Azul', valor:20, cor:'#00d4ff'}, {id:'c2', nome:'Dourado', valor:50, cor:'#ffd700'}];
            let h = "";
            items.forEach(it => {
                const jaTem = userLocal.inventory && userLocal.inventory.includes(it.id);
                h += `<div class="item-row"><span>${it.nome}</span><button class="buy-btn" onclick="comprar('${it.id}', ${it.valor})">${jaTem?'POSSUÍDO':`💰 ${it.valor}`}</button></div>`;
            });
            document.getElementById('shop-content').innerHTML = h;
        }

        async function comprar(id, preco) {
            if(userLocal.inventory && userLocal.inventory.includes(id)) return alert("Já possui!");
            if(userLocal.coins < preco) return alert("Moedas insuficientes!");
            let inv = userLocal.inventory || []; inv.push(id);
            await db.ref('users/'+auth.currentUser.uid).update({ coins: userLocal.coins - preco, inventory: inv });
            abrirLoja();
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                db.ref('users/'+user.uid).on('value', s => {
                    userLocal = s.val() || {};
                    document.getElementById('auth-screen').classList.remove('active');
                    document.getElementById('game-container').style.display='flex';
                    document.getElementById('streakDisplay').innerText = userLocal.streak || 0;
                    document.getElementById('coinsDisplay').innerText = userLocal.coins || 0;
                    if(!segredo) novoJogo();
                });
            }
        });

        function novoJogo() {
            segredo = SEGREDO_POOL[Math.floor(Math.random()*SEGREDO_POOL.length)];
            linha = 0; focadoIndex = 0; tentativaArray = ["","","","",""]; letrasErradas.clear();
            const g = document.getElementById('grid'); g.innerHTML = "";
            for(let i=0; i<6; i++) {
                const r = document.createElement('div'); r.className = 'row';
                for(let j=0; j<5; j++) { 
                    const t = document.createElement('div'); t.className = 'tile'; 
                    t.onclick = () => { if(linha === i) { focadoIndex = j; atualizarVisual(); } };
                    r.appendChild(t); 
                }
                g.appendChild(r);
            }
            criarTeclado(); atualizarVisual();
        }

        async function verificar() {
            const chute = limparTexto(tentativaArray.join(""));
            const alvo = limparTexto(segredo);
            let valida = SEGREDO_POOL.includes(chute);
            if(!valida) {
                try {
                    const res = await fetch(`https://api.dicionario-aberto.net/word/${chute.toLowerCase()}`);
                    const data = await res.json();
                    if(data.length > 0) valida = true;
                } catch(e) { valida = true; } 
            }
            if(!valida) {
                document.getElementById('message').innerText = "Inválida!";
                document.querySelectorAll('.row')[linha].classList.add('shake');
                setTimeout(() => document.querySelectorAll('.row')[linha].classList.remove('shake'), 400);
                return;
            }
            const ts = document.querySelectorAll('.row')[linha].querySelectorAll('.tile');
            let acertos = 0;
            for(let i=0; i<5; i++) {
                const letra = chute[i];
                if(letra === alvo[i]) { ts[i].classList.add('correct'); acertos++; }
                else if(alvo.includes(letra)) { ts[i].classList.add('present'); }
                else { ts[i].classList.add('absent'); letrasErradas.add(letra); }
            }
            if(acertos === 5) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                await db.ref('users/'+auth.currentUser.uid).update({ streak: (userLocal.streak||0) + 1, coins: (userLocal.coins||0) + 2 });
                setTimeout(novoJogo, 2500);
            } else if(linha === 5) {
                document.getElementById('message').innerText = "Era: " + segredo;
                await db.ref('users/'+auth.currentUser.uid).update({ streak: 0 });
                setTimeout(novoJogo, 3000);
            } else { linha++; focadoIndex = 0; tentativaArray = ["","","","",""]; atualizarVisual(); criarTeclado(); }
        }

        function digitar(k) {
            if(k === "ENTER") { if(!tentativaArray.includes("")) verificar(); }
            else if(k === "DEL") { tentativaArray[focadoIndex] = ""; if(focadoIndex > 0) focadoIndex--; }
            else { tentativaArray[focadoIndex] = k; if(focadoIndex < 4) focadoIndex++; }
            atualizarVisual();
        }

        function atualizarVisual() {
            const ts = document.querySelectorAll('.row')[linha].querySelectorAll('.tile');
            ts.forEach((t, i) => { t.innerText = tentativaArray[i]; t.classList.remove('focused'); if(i === focadoIndex) t.classList.add('focused'); });
        }

        function criarTeclado() {
            const lay=[["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["DEL","Z","X","C","V","B","N","M","ENTER"]];
            const kb=document.getElementById('keyboard'); kb.innerHTML="";
            lay.forEach(r=>{
                const d=document.createElement('div'); d.className='kb-row'; d.style.display='flex'; d.style.gap='4px'; d.style.marginBottom='6px';
                r.forEach(k=>{
                    const b=document.createElement('button'); b.className=(k.length>1)?'key wide':'key';
                    if(letrasErradas.has(limparTexto(k))) b.classList.add('hidden');
                    b.innerText=k; b.onclick=()=>digitar(k); d.appendChild(b);
                });
                kb.appendChild(d);
            });
        }

        async function pularPalavra() { window.open(SMARTLINK); await db.ref('users/'+auth.currentUser.uid).update({ streak: (userLocal.streak||0)+1 }); novoJogo(); }
        function fazerLogout() { auth.signOut().then(() => location.reload()); }
        async function fazerLogin() {
            const n = document.getElementById('loginNick').value.trim(); const p = document.getElementById('loginPass').value;
            if(!n || !p) return alert("Preencha!");
            try { await auth.signInWithEmailAndPassword(n.toLowerCase()+"@termo.com", p); } catch(e) { alert("Erro no login!"); }
        }
        async function criarConta() {
            const n = document.getElementById('loginNick').value.trim(); const p = document.getElementById('loginPass').value;
            if(!n || p.length < 6) return alert("Senha mínima 6 dígitos!");
            try { 
                const res = await auth.createUserWithEmailAndPassword(n.toLowerCase()+"@termo.com", p);
                await db.ref('users/'+res.user.uid).set({nick:n, streak:0, coins:0, inventory:[]});
            } catch(e) { alert("Erro ao criar!"); }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogo - Dicas e Anúncios</title>
    <style>
        /* Estilo do Container da Dica (Acima do Teclado) */
        #container-dica {
            display: none; /* Escondido por padrão */
            position: fixed;
            bottom: 300px; /* Ajuste essa altura conforme o tamanho do seu teclado virtual */
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 400px;
            background-color: rgba(0, 0, 0, 0.9);
            color: #00ff00;
            padding: 15px;
            border: 2px solid #00ff00;
            border-radius: 12px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            z-index: 9999;
            box-shadow: 0px 0px 15px rgba(0, 255, 0, 0.5);
        }

        .btn-recompensa {
            padding: 12px 25px;
            background-color: #ffd700;
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="game-area">
        <h1>Wordle Clone</h1>
        <button class="btn-recompensa" onclick="tentarVerDica()">💡 REVELAR DICA (2 Usos)</button>
    </div>

    <div id="container-dica">
        <span id="texto-dica">Carregando dica...</span>
    </div>

    <script>
        // Configurações Iniciais
        let dicasUsadas = parseInt(localStorage.getItem('dicas_hoje')) || 0;
        const LIMITE_DICAS = 2;

        function tentarVerDica() {
            if (dicasUsadas < LIMITE_DICAS) {
                // Se ainda tem usos gratuitos/normais
                revelarDicaReal();
                dicasUsadas++;
                localStorage.setItem('dicas_hoje', dicasUsadas);
            } else {
                // Se acabou, pede para ver o anúncio
                const querVer = confirm("Você já usou suas 2 dicas! Assista a um anúncio para ganhar mais uma?");
                if (querVer) {
                    chamarAnuncioPremiado();
                }
            }
        }

        function chamarAnuncioPremiado() {
            console.log("Iniciando chamada de anúncio...");
            
            // --- COLE O SCRIPT DA SUA REDE AQUI ---
            // Exemplo fictício de como as redes de "Rewarded Ads" funcionam:
            // mostarVideo({ 
            //    onComplete: () => concederRecompensa() 
            // });

            // SIMULAÇÃO: Vamos fingir que o vídeo durou 3 segundos
            alert("Carregando vídeo... espere finalizar.");
            setTimeout(() => {
                concederRecompensa();
            }, 3000);
        }

        function concederRecompensa() {
            alert("Parabéns! Recompensa liberada.");
            revelarDicaReal();
        }

        function revelarDicaReal() {
            const box = document.getElementById('container-dica');
            const texto = document.getElementById('texto-dica');
            
            // Aqui você coloca a lógica para pegar a dica da sua lista
            texto.innerText = "DICA: A palavra contém a letra 'A'!"; 
            
            box.style.display = 'block';

            // Esconde a dica automaticamente após 8 segundos
            setTimeout(() => {
                box.style.display = 'none';
            }, 8000);
        }
    </script>

    </body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Verbete Online</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --cor-correta: #6aaa64; --cor-lugar-errado: #c9b458; --cor-errada: #3a3a3c; --preto: #121213; --selecionado: #ffd700; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background-color: var(--preto); color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; height: 100dvh; display: flex; justify-content: center; align-items: center; }

        .ad-side { position: fixed; top: 50%; transform: translateY(-50%); width: 160px; height: 600px; background: #000; border: 1px solid #333; z-index: 100; }
        .ad-left { left: 10px; }
        .ad-right { right: 10px; }
        @media (max-width: 1000px) { .ad-side { display: none; } }

        .game-column { width: 100%; max-width: 450px; display: flex; flex-direction: column; height: 100%; position: relative; z-index: 10; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .overlay.active { display: flex; }
        .card { background: #222; padding: 25px; border-radius: 15px; width: 100%; max-width: 420px; text-align: center; border: 1px solid #333; }
        
        .btn-main { width: 100%; padding: 14px; background: var(--cor-correta); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1a1a1b; border-bottom: 1px solid #333; }
        
        #grid { display: grid; gap: 5px; padding: 10px; margin: auto; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tile { width: 55px; height: 55px; border: 2px solid #3a3a3c; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold; text-transform: uppercase; }
        .tile.focused { border-color: var(--selecionado) !important; }
        .tile.correct { background: var(--cor-correta); border: none; }
        .tile.present { background: var(--cor-lugar-errado); border: none; }
        .tile.absent { background: var(--cor-errada); border: none; }

        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 8px; }
        .key { height: 55px; background: #818384; border-radius: 4px; color: white; border: none; font-size: 0.9rem; font-weight: bold; flex: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .key.wide { flex: 1.5; background: #565758; }
        .key.hidden { opacity: 0.2; pointer-events: none; }

        .btn-hint { width: calc(100% - 20px); margin: 0 10px 10px 10px; padding: 14px; background: #e67e22; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .list-container { text-align: left; margin: 15px 0; max-height: 280px; overflow-y: auto; background: #111; padding: 10px; border-radius: 8px; border: 1px solid #444; }
        .item-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; align-items: center; }
    </style>
</head>
<body>

    <div class="ad-side ad-left">
        <script type="text/javascript">atOptions = { 'key' : 'bbd26afcc6a6f83c66b0322a7e089fb1', 'format' : 'iframe', 'height' : 600, 'width' : 160, 'params' : {} };</script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/bbd26afcc6a6f83c66b0322a7e089fb1/invoke.js"></script>
    </div>

    <div class="ad-side ad-right">
        <script type="text/javascript">atOptions = { 'key' : 'bbd26afcc6a6f83c66b0322a7e089fb1', 'format' : 'iframe', 'height' : 600, 'width' : 160, 'params' : {} };</script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/bbd26afcc6a6f83c66b0322a7e089fb1/invoke.js"></script>
    </div>

    <div class="game-column">
        <div id="auth-screen" class="overlay active">
            <div class="card">
                <h1>VERBETE</h1>
                <input type="text" id="loginNick" style="width:100%; padding:12px; margin-bottom:10px;" placeholder="Usuário">
                <input type="password" id="loginPass" style="width:100%; padding:12px; margin-bottom:10px;" placeholder="Senha">
                <button class="btn-main" onclick="fazerLogin()">Entrar</button>
                <button class="btn-main" style="background:#444" onclick="criarConta()">Criar Conta</button>
            </div>
        </div>

        <div id="game-container" style="display:none; flex-direction:column; height:100%;">
            <div class="top-nav">
                <div>🔥 <span id="streakDisplay">0</span> | 💰 <span id="coinsDisplay">0</span></div>
                <div>
                    <button onclick="abrirLoja()" style="background:#333; border:none; color:white; padding:5px 8px; border-radius:4px; cursor:pointer;">🛒</button>
                    <button onclick="abrirRanking()" style="background:#333; border:none; color:white; padding:5px 8px; border-radius:4px; cursor:pointer; margin-left:5px;">🏆</button>
                    <button onclick="fazerLogout()" style="background:#333; border:none; color:white; padding:5px 8px; border-radius:4px; cursor:pointer; margin-left:5px;">🚪</button>
                </div>
            </div>
            
            <div id="grid"></div>
            <div id="message" style="color:var(--selecionado); text-align:center; height:20px; font-weight:bold; margin-bottom:5px;"></div>
            <button class="btn-hint" onclick="revelarLetra()">🔍 DICA (💰10)</button>
            <div style="padding:0 10px 10px 10px;"><button id="btnPular" onclick="proximoNivelAds()" style="width:100%; padding:10px; background:#4a90e2; border:none; border-radius:8px; color:white; font-weight:bold;">⏭️ PULAR (ADS)</button></div>
            <div id="keyboard" style="padding:10px;"></div>
        </div>
    </div>

    <div id="rank-screen" class="overlay"><div class="card"><h2>🏆 RANKING</h2><div id="rank-content" class="list-container">Carregando...</div><button class="btn-main" onclick="fecharTelas()">VOLTAR</button></div></div>
    <div id="shop-screen" class="overlay"><div class="card"><h2>🛒 LOJA</h2><p>Moedas: 💰 <span id="shopCoins">0</span></p><div id="shop-content" class="list-container"></div><button class="btn-main" onclick="fecharTelas()">SAIR</button></div></div>
    <div id="ad-screen" class="overlay"><div class="card"><h2 id="ad-status"></h2><p id="ad-msg"></p><button class="btn-main" onclick="proximoNivelAds()">PRÓXIMO ⏭️</button></div></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCxq9aM8B_XWioHztJhVVLnawlykYD2xs0", authDomain: "termo-rank-5d80d.firebaseapp.com", databaseURL: "https://termo-rank-5d80d-default-rtdb.firebaseio.com", projectId: "termo-rank-5d80d", storageBucket: "termo-rank-5d80d.firebasestorage.app" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();
        const LINK_SMART = "https://www.profitablecpmratenetwork.com/sw8yv06j5g?key=edf6d59c2cca79eb989069841f9cb072";
        const SEGREDO_POOL = ["SAGAZ", "AMAGO", "TERMO", "EXITO", "NOBRE", "SENSO", "AFETO", "ALGOZ", "ETICA", "FAZER", "PODER", "VIVER", "JUSTO", "IDEIA", "MUITO", "SONHO", "TEMPO", "VALOR", "BRAVO", "FORTE", "GRITO", "MUNDO", "COCOS", "CASAS", "PORTA", "MESA", "LIVRO", "FOGO", "AGUA", "VENTO", "TERRA", "AREIA", "PLANO"];
        const ITENS_LOJA = [{id:'t1', nome:'[Iniciante]', valor:10}, {id:'t2', nome:'[Mestre]', valor:100}, {id:'c1', nome:'Cor Azul', valor:50}, {id:'c2', nome:'Cor Ouro', valor:200}];

        let segredo = ""; let linha = 0; let focadoIndex = 0;
        let tentativaArray = ["","","","",""]; let letrasErradas = new Set();
        let userLocal = {};

        window.addEventListener('keydown', (e) => {
            if (document.querySelector('.overlay.active')) return;
            const key = e.key.toUpperCase();
            if (key === 'ENTER') verificar();
            else if (key === 'BACKSPACE') digitar('DEL');
            else if (key.length === 1 && key >= 'A' && key <= 'Z') digitar(key);
        });

        function fecharTelas() { document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active')); }
        function digitar(k) {
            if(k === "DEL") { tentativaArray[focadoIndex] = ""; if(focadoIndex > 0) focadoIndex--; }
            else { tentativaArray[focadoIndex] = k; if(focadoIndex < 4) focadoIndex++; }
            atualizarVisual();
        }

        async function verificar() {
            const chute = tentativaArray.join("").toUpperCase();
            if (chute.length < 5) return;
            const ts = document.querySelectorAll('.row')[linha].querySelectorAll('.tile');
            let acertos = 0;
            for(let i=0; i<5; i++) {
                if(chute[i] === segredo[i]) { ts[i].classList.add('correct'); acertos++; }
                else if(segredo.includes(chute[i])) { ts[i].classList.add('present'); }
                else { ts[i].classList.add('absent'); letrasErradas.add(chute[i]); }
            }
            if(acertos === 5) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                await db.ref('users/'+auth.currentUser.uid).update({ streak: (userLocal.streak||0) + 1, coins: (userLocal.coins||0) + 2 });
                mostrarTelaAds("VITÓRIA!", "Palavra encontrada!");
            } else if(linha === 5) {
                await db.ref('users/'+auth.currentUser.uid).update({ streak: 0 });
                mostrarTelaAds("DERROTA!", "Era: " + segredo);
            } else { linha++; focadoIndex = 0; tentativaArray = ["","","","",""]; atualizarVisual(); criarTeclado(); }
        }

        // LÓGICA DO RANKING (AGORA BUSCA DE VERDADE)
        function abrirRanking() {
            const rContent = document.getElementById('rank-content');
            rContent.innerHTML = "Carregando...";
            document.getElementById('rank-screen').classList.add('active');
            
            db.ref('users').orderByChild('streak').limitToLast(10).once('value', (snapshot) => {
                let list = [];
                snapshot.forEach(child => { list.push(child.val()); });
                list.reverse();
                let html = "";
                list.forEach((u, i) => {
                    html += `<div class="item-row"><span>${i+1}º ${u.nick}</span><span>🔥 ${u.streak || 0}</span></div>`;
                });
                rContent.innerHTML = html || "Nenhum jogador ainda.";
            });
        }

        // LÓGICA DA LOJA (COMPRANDO DE VERDADE)
        function abrirLoja() {
            document.getElementById('shopCoins').innerText = userLocal.coins || 0;
            const sContent = document.getElementById('shop-content');
            let html = "";
            ITENS_LOJA.forEach(it => {
                const jaTem = userLocal.inventory?.includes(it.id);
                html += `<div class="item-row"><span>${it.nome}</span>
                         <button onclick="comprarItem('${it.id}', ${it.valor})" style="background:#4a90e2; border:none; color:white; padding:5px 10px; border-radius:4px;">
                         ${jaTem ? 'OK' : '💰'+it.valor}</button></div>`;
            });
            sContent.innerHTML = html;
            document.getElementById('shop-screen').classList.add('active');
        }

        async function comprarItem(id, preco) {
            if(userLocal.inventory?.includes(id)) return;
            if(userLocal.coins < preco) return alert("Moedas insuficientes!");
            let inv = userLocal.inventory || [];
            inv.push(id);
            await db.ref('users/'+auth.currentUser.uid).update({ coins: userLocal.coins - preco, inventory: inv });
            abrirLoja();
        }

        function novoJogo() {
            segredo = SEGREDO_POOL[Math.floor(Math.random()*SEGREDO_POOL.length)];
            linha = 0; focadoIndex = 0; tentativaArray = ["","","","",""]; letrasErradas.clear();
            const g = document.getElementById('grid'); g.innerHTML = "";
            for(let i=0; i<6; i++) {
                const r = document.createElement('div'); r.className = 'row';
                for(let j=0; j<5; j++) { 
                    const t = document.createElement('div'); t.className = 'tile'; 
                    t.onclick = () => { if(linha === i) { focadoIndex = j; atualizarVisual(); } };
                    r.appendChild(t); 
                }
                g.appendChild(r);
            }
            criarTeclado(); atualizarVisual();
        }

        function criarTeclado() {
            const lay=[["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["DEL","Z","X","C","V","B","N","M","ENTER"]];
            const kb=document.getElementById('keyboard'); kb.innerHTML="";
            lay.forEach(r=>{
                const d=document.createElement('div'); d.className='kb-row';
                r.forEach(k=>{
                    const b=document.createElement('button'); b.className=(k.length>1)?'key wide':'key';
                    if(letrasErradas.has(k)) b.classList.add('hidden');
                    b.innerText = k; b.onclick = () => (k==='ENTER'?verificar():digitar(k)); d.appendChild(b);
                });
                kb.appendChild(d);
            });
        }

        function atualizarVisual() {
            const ts = document.querySelectorAll('.row')[linha].querySelectorAll('.tile');
            ts.forEach((t, i) => { t.innerText = tentativaArray[i]; t.classList.remove('focused'); if(i === focadoIndex) t.classList.add('focused'); });
        }

        function mostrarTelaAds(t, m) { document.getElementById('ad-status').innerText = t; document.getElementById('ad-msg').innerText = m; document.getElementById('ad-screen').classList.add('active'); }
        function proximoNivelAds() { window.open(LINK_SMART, '_blank'); fecharTelas(); novoJogo(); }
        async function revelarLetra() { if(userLocal.coins < 10) return alert("Sem moedas!"); await db.ref('users/'+auth.currentUser.uid).update({ coins: userLocal.coins - 10 }); document.getElementById('message').innerText = "Começa com: " + segredo[0]; }

        auth.onAuthStateChanged(user => {
            if(user) {
                db.ref('users/'+user.uid).on('value', s => {
                    userLocal = s.val() || {};
                    document.getElementById('auth-screen').classList.remove('active');
                    document.getElementById('game-container').style.display='flex';
                    document.getElementById('streakDisplay').innerText = userLocal.streak || 0;
                    document.getElementById('coinsDisplay').innerText = userLocal.coins || 0;
                    if(!segredo) novoJogo();
                });
            }
        });

        async function fazerLogin() { const n = document.getElementById('loginNick').value.trim().toLowerCase(); const p = document.getElementById('loginPass').value; auth.signInWithEmailAndPassword(n+"@termo.com", p).catch(() => alert("Erro!")); }
        async function criarConta() { const n = document.getElementById('loginNick').value.trim().toLowerCase(); const p = document.getElementById('loginPass').value; if(!n || p.length < 6) return alert("Dados inválidos!"); const res = await auth.createUserWithEmailAndPassword(n+"@termo.com", p); await db.ref('users/'+res.user.uid).set({nick:n, streak:0, coins:0, inventory:[]}); }
        function fazerLogout() { auth.signOut().then(() => location.reload()); }
    </script>
    
    <script type='text/javascript' src='https://pl29010888.profitablecpmratenetwork.com/a4/b5/a8/a4b5a8c3910b3d082855407a6ae50703.js'></script>
</body>
</html>

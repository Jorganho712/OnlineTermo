<!DOCTYPE html>
<html lang="pt-br">
<head>

    <style>
        :root { --cor-correta: #6aaa64; --cor-lugar-errado: #c9b458; --cor-errada: #3a3a3c; --preto: #121213; }
        
        * { box-sizing: border-box; }
        body { 
            background-color: var(--preto); color: white; font-family: sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
        }

        /* Layout Principal */
        .main-layout { display: flex; justify-content: center; height: 100%; width: 100%; }
        
        /* Sidebars apenas para PC */
        .ad-sidebar { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 20px; background: #000; min-width: 160px; }
        
        .game-column { width: 100%; max-width: 450px; display: flex; flex-direction: column; height: 100%; position: relative; }

        @media (max-width: 800px) {
            .ad-sidebar { display: none !important; }
            .tile { width: 38px !important; height: 38px !important; font-size: 1.2rem !important; }
            .key { padding: 12px 0 !important; font-size: 0.7rem !important; }
            #grid { gap: 3px !important; }
        }

        /* Telas */
        #auth-screen { position: absolute; inset: 0; background: var(--preto); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .auth-card { background: #222; padding: 20px; border-radius: 10px; width: 85%; text-align: center; border: 1px solid #333; }

        #game-container { display: none; flex-direction: column; height: 100%; width: 100%; }

        /* Header reduzido para ganhar espaço */
        .header-jogo { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; background: #1a1a1b; height: 40px; }
        .btn-logout { background: #ce3a3a; color: white; border: none; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }

        /* Área do Jogo */
        #game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px; }
        #grid { display: grid; gap: 5px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tile { width: 50px; height: 50px; border: 2px solid #3a3a3c; display: flex; justify-content: center; align-items: center; font-size: 1.6rem; font-weight: bold; text-transform: uppercase; }
        
        .tile.correct { background: var(--cor-correta); border: none; }
        .tile.present { background: var(--cor-lugar-errado); border: none; }
        .tile.absent { background: var(--cor-errada); border: none; }

        /* Teclado - O segredo está no padding-bottom */
        #keyboard { padding: 4px; padding-bottom: env(safe-area-inset-bottom, 15px); }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 4px; }
        .key { padding: 16px 0; background: #818384; border-radius: 4px; color: white; border: none; cursor: pointer; font-size: 0.85rem; font-weight: bold; flex: 1; }
        .key.wide { flex: 1.6; background: #565758; }

        /* Espaço garantido para anúncio mobile */
        .mobile-banner { height: 50px; width: 100%; background: #000; display: none; text-align: center; }
        @media (max-width: 800px) { .mobile-banner { display: block; } }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="ad-sidebar">
            <script>atOptions={'key':'bbd26afcc6a6f83c66b0322a7e089fb1','format':'iframe','height':600,'width':160,'params':{}};</script>
            <script src="//www.highperformanceformat.com/bbd26afcc6a6f83c66b0322a7e089fb1/invoke.js"></script>
        </div>

        <div class="game-column">
            <div id="auth-screen">
                <div class="auth-card">
                    <h2 style="margin:0 0 15px 0">Termo Infinito</h2>
                    <input type="text" id="loginNick" placeholder="Nome" style="width:100%; padding:10px; margin-bottom:10px; background:#111; color:white; border:1px solid #444; border-radius:5px;">
                    <input type="password" id="loginPass" placeholder="Senha" style="width:100%; padding:10px; margin-bottom:15px; background:#111; color:white; border:1px solid #444; border-radius:5px;">
                    <button onclick="fazerLogin()" style="width:100%; padding:12px; background:var(--cor-correta); border:none; color:white; font-weight:bold; border-radius:5px; cursor:pointer;">JOGAR</button>
                    <button onclick="entrarComoConvidado()" style="background:none; border:none; color:#666; margin-top:15px; cursor:pointer; text-decoration:underline;">Entrar como Visitante</button>
                </div>
            </div>

            <div id="game-container">
                <div class="header-jogo">
                    <div style="font-size:12px;">👤 <span id="displayNick"></span> | 🔥 <span id="streakDisplay">0</span></div>
                    <button class="btn-logout" onclick="logout()">SAIR</button>
                </div>
                
                <div id="game-area">
                    <div id="grid"></div>
                    <div id="message" style="height:20px; color:#ffd700; font-size:13px; margin-top:5px; font-weight:bold;"></div>
                </div>

                <div id="keyboard"></div>

                <div class="mobile-banner">
                    <span style="font-size:9px; color:#333;">PUBLICIDADE</span>
                </div>
            </div>
        </div>

        <div class="ad-sidebar">
            <script>atOptions={'key':'bbd26afcc6a6f83c66b0322a7e089fb1','format':'iframe','height':600,'width':160,'params':{}};</script>
            <script src="//www.highperformanceformat.com/bbd26afcc6a6f83c66b0322a7e089fb1/invoke.js"></script>
        </div>
    </div>

    <script>
        // Configurações do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCxq9aM8B_XWioHztJhVVLnawlykYD2xs0",
            authDomain: "termo-rank-5d80d.firebaseapp.com",
            databaseURL: "https://termo-rank-5d80d-default-rtdb.firebaseio.com",
            projectId: "termo-rank-5d80d",
            storageBucket: "termo-rank-5d80d.firebasestorage.app",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let nickAtual = ""; let streak = 0; let segredo = ""; let linha = 0; 
        let tentativaArray = ["", "", "", "", ""]; let focadoIndex = 0;
        const PALAVRAS = ["SAGAZ", "AMAGO", "TERMO", "EXITO", "NOBRE", "SENSO", "AFETO", "ALGOZ", "ETICA", "FAZER", "PODER", "MUITO", "VIVER", "JUSTO", "IDEIA", "SUTIL", "VIGOR", "AUREA"];

        async function fazerLogin() {
            const nick = document.getElementById('loginNick').value.trim();
            const pass = document.getElementById('loginPass').value;
            if(!nick) return;
            try { await auth.signInWithEmailAndPassword(nick.toLowerCase() + "@termo.com", pass); } catch (e) { alert("Dados incorretos!"); }
        }

        function entrarComoConvidado() { nickAtual = "Visitante"; mostrarJogo(); }
        function logout() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).once('value').then(snap => {
                    nickAtual = snap.val().nick; streak = snap.val().streak || 0;
                    mostrarJogo();
                });
            }
        });

        function mostrarJogo() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('displayNick').innerText = nickAtual;
            document.getElementById('streakDisplay').innerText = streak;
            novoJogo(); criarTeclado();
        }

        function novoJogo() {
            segredo = PALAVRAS[Math.floor(Math.random() * PALAVRAS.length)].toUpperCase();
            linha = 0; tentativaArray = ["", "", "", "", ""]; focadoIndex = 0;
            const grid = document.getElementById('grid'); grid.innerHTML = "";
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div'); row.className = 'row';
                for (let j = 0; j < 5; j++) {
                    const t = document.createElement('div'); t.className = 'tile';
                    row.appendChild(t);
                }
                grid.appendChild(row);
            }
            atualizarVisual();
        }

        function atualizarVisual() {
            const rows = document.querySelectorAll('.row');
            if(!rows[linha]) return;
            const tiles = rows[linha].querySelectorAll('.tile');
            tiles.forEach((t, i) => { t.innerText = tentativaArray[i]; });
        }

        function digitar(k) {
            if(k === 'ENTER') { if(tentativaArray.join('').length === 5) verificar(); return; }
            if(k === 'DEL') { if(focadoIndex > 0) { focadoIndex--; tentativaArray[focadoIndex] = ""; } }
            else { if(focadoIndex < 5) { tentativaArray[focadoIndex] = k; focadoIndex++; } }
            atualizarVisual();
        }

        function verificar() {
            const tiles = document.querySelectorAll('.row')[linha].querySelectorAll('.tile');
            let ok = 0;
            for(let i=0; i<5; i++) {
                if(tentativaArray[i] === segredo[i]) { tiles[i].classList.add('correct'); ok++; }
                else if(segredo.includes(tentativaArray[i])) tiles[i].classList.add('present');
                else tiles[i].classList.add('absent');
            }
            if(ok === 5) { 
                document.getElementById('message').innerText = "VENCEU! 🎉"; 
                if(nickAtual !== "Visitante") {
                    streak++;
                    db.ref('users/' + auth.currentUser.uid).update({ streak: streak });
                    document.getElementById('streakDisplay').innerText = streak;
                }
                setTimeout(novoJogo, 2000); 
            } else if(linha === 5) {
                document.getElementById('message').innerText = "ERA: " + segredo;
                setTimeout(novoJogo, 3000);
            } else { linha++; focadoIndex = 0; tentativaArray = ["","","","",""]; atualizarVisual(); }
        }

        function criarTeclado() {
            const lay = [["Q","W","E","R","T","Y","U","I","O","P"], ["A","S","D","F","G","H","J","K","L"], ["DEL","Z","X","C","V","B","N","M","ENTER"]];
            const kb = document.getElementById('keyboard'); kb.innerHTML = "";
            lay.forEach(r => {
                const div = document.createElement('div'); div.className = 'kb-row';
                r.forEach(k => {
                    const b = document.createElement('button'); b.className = (k.length > 1) ? 'key wide' : 'key';
                    b.innerText = k; b.onclick = () => digitar(k); div.appendChild(b);
                });
                kb.appendChild(div);
            });
        }
    </script>
</body>
</html>

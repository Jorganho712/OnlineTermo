<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termo Infinito - Oficial</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --cor-correta: #6aaa64; --cor-lugar-errado: #c9b458; --cor-errada: #3a3a3c; --preto: #121213; }
        body { background-color: var(--preto); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 15px; min-height: 100vh; overflow-x: hidden; }
        
        .auth-card { background: #222; padding: 25px; border-radius: 15px; border: 1px solid #444; width: 300px; text-align: center; margin-top: 30px; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #444; background: #111; color: white; outline: none; }
        button.btn-main { width: 100%; padding: 12px; background: var(--cor-correta); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button.btn-guest { width: 100%; padding: 10px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        
        /* Layout com Anúncios Laterais */
        .game-layout-container { display: flex; justify-content: center; align-items: flex-start; gap: 20px; width: 100%; max-width: 1300px; margin-top: 15px; }
        .side-ad { width: 160px; min-height: 600px; }
        @media (max-width: 1000px) { .side-ad { display: none; } }

        #central-game-area { display: flex; flex-direction: column; align-items: center; flex: 1; }
        #grid { display: grid; gap: 5px; margin-bottom: 15px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tile { width: 48px; height: 48px; border: 2px solid #3a3a3c; display: flex; justify-content: center; align-items: center; font-size: 1.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .tile.selected { border-color: #ffd700; background: #2a2a2e; }
        .tile.correct { background: var(--cor-correta); border: none; }
        .tile.present { background: var(--cor-lugar-errado); border: none; }
        .tile.absent { background: var(--cor-errada); border: none; }

        #keyboard { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; width: 100%; }
        .kb-row { display: flex; justify-content: center; gap: 4px; }
        .key { padding: 15px 8px; background: #818384; border-radius: 4px; color: white; border: none; cursor: pointer; font-size: 0.8rem; font-weight: bold; min-width: 32px; }
        .key.wide { min-width: 50px; background: #565758; }

        #ad-bottom { margin: 20px 0; min-height: 90px; width: 100%; text-align: center; }
        #leaderboard { width: 100%; max-width: 300px; background: #1a1a1b; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-top: 10px; }
        .rank-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #333; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div id="login-box" class="auth-card">
            <h2>Termo Infinito</h2>
            <input type="text" id="loginNick" placeholder="Seu Nome/Nick">
            <input type="password" id="loginPass" placeholder="Senha">
            <button class="btn-main" onclick="fazerLogin()">ENTRAR</button>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #444;">
            <input type="text" id="guestNickInput" placeholder="Nick de Convidado">
            <button class="btn-guest" onclick="entrarComoConvidado()">JOGAR COMO CONVIDADO</button>
            <p style="font-size: 0.8rem; color: #aaa; margin-top: 15px; cursor: pointer;" onclick="alternarTelas('signup-box')">Criar nova conta com Nome</p>
        </div>

        <div id="signup-box" class="auth-card" style="display:none">
            <h2>Nova Conta</h2>
            <input type="text" id="userNick" placeholder="Escolha um Nome">
            <input type="password" id="userPass" placeholder="Senha (mín. 6 letras)">
            <button class="btn-main" onclick="criarConta()">CADASTRAR E JOGAR</button>
            <p style="font-size: 0.8rem; color: #aaa; margin-top: 15px; cursor: pointer;" onclick="alternarTelas('login-box')">Voltar ao Login</p>
        </div>
    </div>

    <div id="game-container" style="display:none">
        <div style="width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span>👤 <b id="displayNick"></b></span>
            <span>🔥 Streak: <b id="streak">0</b></span>
        </div>

        <div class="game-layout-container">
            <div class="side-ad">
                <script type="text/javascript">
                    atOptions = {'key' : 'bbd26afcc6a6f83c66b0322a7e089fb1', 'format' : 'iframe', 'height' : 600, 'width' : 160, 'params' : {}};
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/bbd26afcc6a6f83c66b0322a7e089fb1/invoke.js"></script>
            </div>

            <div id="central-game-area">
                <div id="grid"></div>
                <div id="message" style="color: #ffd700; font-weight: bold; margin-bottom: 10px; height: 20px;"></div>
                <div id="keyboard"></div>
            </div>

            <div class="side-ad">
                <script type="text/javascript">
                    atOptions = {'key' : 'bbd26afcc6a6f83c66b0322a7e089fb1', 'format' : 'iframe', 'height' : 600, 'width' : 160, 'params' : {}};
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/bbd26afcc6a6f83c66b0322a7e089fb1/invoke.js"></script>
            </div>
        </div>

        <div id="ad-bottom">
            <script type="text/javascript">
                atOptions = {'key' : 'b2c5b5eb74a40bdb1a533534b525704c', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {}};
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/b2c5b5eb74a40bdb1a533534b525704c/invoke.js"></script>
        </div>

        <div id="leaderboard">
            <h4 style="margin: 0 0 10px 0; text-align: center; color: var(--cor-lugar-errado);">🏆 RANKING</h4>
            <div id="rank-list"></div>
        </div>
        
        <button onclick="location.reload()" style="margin-top: 20px; background: transparent; color: #666; border: none; cursor: pointer;">Sair / Logout</button>
    </div>

    <script>
        // Config do Firebase baseada no seu print
        const firebaseConfig = {
            apiKey: "AIzaSyCxq9aM8B_XWioHztJhVVLnawlykYD2xs0",
            authDomain: "termo-rank-5d80d.firebaseapp.com",
            databaseURL: "https://termo-rank-5d80d-default-rtdb.firebaseio.com",
            projectId: "termo-rank-5d80d",
            storageBucket: "termo-rank-5d80d.firebasestorage.app",
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let nickAtual = ""; let streak = 0; let segredo = ""; let linha = 0; 
        let tentativaArray = ["", "", "", "", ""]; let focadoIndex = 0; let logado = false;

        const PALAVRAS = ["SAGAZ", "AMAGO", "TERMO", "EXITO", "NOBRE", "SENSO", "AFETO", "ALGOZ", "ETICA", "FAZER", "TENRA", "SUTIL", "VIGOR", "AUREA", "SANAR", "PODER", "AUDAS", "IDEIA", "CERNE", "MUITO", "MORAL", "SOBRE", "JUSTO", "HONRA", "MUNDO"];

        function alternarTelas(id) {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('signup-box').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }

        // Função de Convidado (Voltou a funcionar!)
        function entrarComoConvidado() {
            const nick = document.getElementById('guestNickInput').value.trim();
            if(nick.length < 3) return alert("Escolha um Nick maior!");
            nickAtual = nick;
            logado = false;
            iniciarInterfaceJogo();
        }

        // Criar conta usando apenas Nome
        async function criarConta() {
            const nick = document.getElementById('userNick').value.trim();
            const pass = document.getElementById('userPass').value;
            if(!nick || pass.length < 6) return alert("Nick curto ou senha menor que 6 caracteres!");
            
            const fakeEmail = nick.toLowerCase().replace(/\s/g, '') + "@termo.com";
            try {
                const res = await auth.createUserWithEmailAndPassword(fakeEmail, pass);
                await db.ref('users/' + res.user.uid).set({ nick: nick, streak: 0 });
            } catch (e) { alert("Este nome já pode estar em uso ou erro no sistema."); }
        }

        // Login usando apenas Nome
        async function fazerLogin() {
            const nick = document.getElementById('loginNick').value.trim();
            const pass = document.getElementById('loginPass').value;
            const fakeEmail = nick.toLowerCase().replace(/\s/g, '') + "@termo.com";
            try { await auth.signInWithEmailAndPassword(fakeEmail, pass); } catch (e) { alert("Nome ou senha incorretos!"); }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).once('value').then(snap => {
                    nickAtual = snap.val().nick;
                    streak = snap.val().streak || 0;
                    logado = true;
                    iniciarInterfaceJogo();
                });
            }
        });

        function iniciarInterfaceJogo() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('displayNick').innerText = nickAtual;
            document.getElementById('streak').innerText = streak;
            carregarRank(); novoJogo(); criarTeclado();
        }

        function novoJogo() {
            segredo = PALAVRAS[Math.floor(Math.random() * PALAVRAS.length)].toUpperCase();
            linha = 0; tentativaArray = ["", "", "", "", ""]; focadoIndex = 0;
            const grid = document.getElementById('grid'); grid.innerHTML = "";
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div'); row.className = 'row';
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement('div'); tile.className = 'tile';
                    tile.onclick = () => { if(i === linha) { focadoIndex = j; atualizarVisual(); } };
                    row.appendChild(tile);
                }
                grid.appendChild(row);
            }
            atualizarVisual();
        }

        function atualizarVisual() {
            const rows = document.querySelectorAll('.row');
            if(!rows[linha]) return;
            const tiles = rows[linha].querySelectorAll('.tile');
            tiles.forEach((t, i) => {
                t.innerText = tentativaArray[i];
                t.classList.toggle('selected', i === focadoIndex);
            });
        }

        function digitar(k) {
            if(k === 'ENTER') { if(tentativaArray.filter(l => l!=="").length === 5) verificar(); return; }
            if(k === 'DEL') {
                tentativaArray[focadoIndex] = "";
                if(focadoIndex > 0) focadoIndex--;
            } else if(/^[A-Z]$/.test(k)) {
                tentativaArray[focadoIndex] = k;
                if(focadoIndex < 4) focadoIndex++;
            }
            atualizarVisual();
        }

        function verificar() {
            const tiles = document.querySelectorAll('.row')[linha].querySelectorAll('.tile');
            let acertos = 0;
            const count = {};
            for(let l of segredo) count[l] = (count[l] || 0) + 1;
            const estados = new Array(5).fill('absent');

            for(let i=0; i<5; i++) {
                if(tentativaArray[i] === segredo[i]) { estados[i] = 'correct'; acertos++; count[tentativaArray[i]]--; }
            }
            for(let i=0; i<5; i++) {
                if(estados[i] === 'correct') continue;
                if(segredo.includes(tentativaArray[i]) && count[tentativaArray[i]] > 0) { 
                    estados[i] = 'present'; count[tentativaArray[i]]--; 
                }
            }
            for(let i=0; i<5; i++) { tiles[i].classList.add(estados[i]); }

            if(acertos === 5) {
                if(logado) {
                    streak++;
                    db.ref('users/' + auth.currentUser.uid).update({ streak: streak });
                    db.ref('ranking/' + nickAtual).set({ nome: nickAtual, streak: streak });
                    document.getElementById('streak').innerText = streak;
                }
                document.getElementById('message').innerText = "VITORIA!";
                setTimeout(novoJogo, 2000);
            } else if(linha === 5) {
                document.getElementById('message').innerText = "PALAVRA: " + segredo;
                if(logado) {
                    streak = 0;
                    db.ref('users/' + auth.currentUser.uid).update({ streak: 0 });
                    document.getElementById('streak').innerText = 0;
                }
                setTimeout(novoJogo, 3000);
            } else { linha++; tentativaArray = ["","","","",""]; focadoIndex = 0; atualizarVisual(); }
        }

        function carregarRank() {
            db.ref('ranking').orderByChild('streak').limitToLast(5).on('value', snap => {
                const list = document.getElementById('rank-list'); list.innerHTML = "";
                let d = []; snap.forEach(c => { d.push(c.val()); });
                d.reverse().forEach((p, i) => { 
                    list.innerHTML += `<div class="rank-item"><span>${i+1}º ${p.nome}</span> <b>${p.streak}</b></div>`; 
                });
            });
        }

        function criarTeclado() {
            const lay = [["Q","W","E","R","T","Y","U","I","O","P"], ["A","S","D","F","G","H","J","K","L"], ["DEL","Z","X","C","V","B","N","M","ENTER"]];
            const kb = document.getElementById('keyboard'); kb.innerHTML = "";
            lay.forEach(r => {
                const div = document.createElement('div'); div.className = 'kb-row';
                r.forEach(k => {
                    const b = document.createElement('button'); 
                    b.className = (k === 'ENTER' || k === 'DEL') ? 'key wide' : 'key';
                    b.innerText = k; b.onclick = () => digitar(k); div.appendChild(b);
                });
                kb.appendChild(div);
            });
        }
    </script>
</body>
</html>
